    btn.addEventListener('click', () => {
      editState = { key: null, draft: null };
      renderHistory();
    });
  });
}

// ---------- Render: Settings ----------
function renderSettings() {
  const container = document.getElementById('settings-content');
  const lastBackupStr = metaStore.lastBackup
    ? new Date(metaStore.lastBackup).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })
    : 'never';

  container.innerHTML = `
    <div class="date-line">Configuration</div>
    <h1 class="greeting">Options<em>.</em></h1>
    <div class="section-label">Data</div>
    <details class="help" open>
      <summary>Where does my data live?</summary>
      <div class="body">
        Everything is stored in your browser's <strong>localStorage</strong> — only on this device, in this browser. Nothing leaves your phone.
        <br><br>
        That's private and fast, but it has one risk: <strong>if you clear Safari data, switch phones, or your browser purges storage, it's gone.</strong> Backups protect against this.
        <br><br>
        Last backup: <strong>${lastBackupStr}</strong>
      </div>
    </details>
    <label class="file-label">
      Import data (JSON)
      <input type="file" id="import-input" accept="application/json,.json" />
    </label>
    <button class="action-btn" id="export-btn">Export data (JSON)</button>
    <button class="action-btn danger" id="wipe-btn">Delete all data</button>
  `;

  container.querySelector('#export-btn').addEventListener('click', () => {
    exportJSON();
    metaStore.lastBackup = new Date().toISOString();
    persistMeta(); renderSettings();
  });
  container.querySelector('#import-input').addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    if (!confirm("Importing will merge with your current data. Continue?")) return;
    try {
      const data = JSON.parse(await file.text());
      if (data.version !== 5) { alert('Unrecognized backup format (expected version 5).'); return; }
      if (data.meta)  { Object.assign(metaStore,  data.meta);  persistMeta(); }
      if (data.hama)  { Object.assign(hamaStore.history,  data.hama);  persistHama(); }
      if (data.sleep) { Object.assign(sleepStore.history, data.sleep); persistSleep(); }
      if (data.calm)  { Object.assign(calmStore.narrations, data.calm); persistCalm(); }
      if (data.toolkit) {
        const merge = (load, save, arr) => {
          if (!Array.isArray(arr)) return;
          const ex = load(); const ids = new Set(ex.map(x => x.id));
          save([...ex, ...arr.filter(x => !ids.has(x.id))]);
        };
        merge(loadTkThought,   saveTkThought,   data.toolkit.thought);
        merge(loadTkSituation, saveTkSituation, data.toolkit.situation);
        merge(loadTkValues,    saveTkValues,    data.toolkit.values);
        merge(loadTkExp,       saveTkExp,       data.toolkit.exposure);
      }
      renderSettings(); showSaved('imported');
    } catch(err) { alert('Could not read that file: ' + err.message); }
  });
  container.querySelector('#wipe-btn').addEventListener('click', () => {
    if (!confirm("Delete EVERYTHING — all history? This cannot be undone.")) return;
    if (!confirm("Really sure? Export a backup first if you might want this data later.")) return;
    [META_KEY, HAMA_KEY, SLEEP_KEY, CALM_KEY, TK_THOUGHT_KEY, TK_SITUATION_KEY, TK_VALUES_KEY, TK_EXPOSURE_KEY]
      .forEach(k => localStorage.removeItem(k));
    metaStore  = { lastBackup: null, nudgeDismissedUntil: null, pmrShown: {}, pmrOrder: [], pmrTenseSec: 3, pmrRelaxSec: 10 };
    hamaStore  = { history: {} };
    sleepStore = { history: {} };
    calmStore  = { narrations: {} };
    renderSettings(); showSaved('wiped');
  });
}

// ---------- Export / Import ----------
function exportJSON() {
  const data = {
    meta: metaStore,
    hama: hamaStore.history,
    sleep: sleepStore.history,
    calm: calmStore.narrations,
    toolkit: {
      thought:   loadTkThought(),
      situation: loadTkSituation(),
      values:    loadTkValues(),
      exposure:  loadTkExp(),
    },
    exportedAt: new Date().toISOString(),
    version: 5,
  };
  download(`nagi-${todayKey()}.json`, JSON.stringify(data, null, 2), 'application/json');
}
function download(filename, content, mime) {
  const url = URL.createObjectURL(new Blob([content], { type: mime || 'text/plain' }));
  Object.assign(document.createElement('a'), { href: url, download: filename }).click();
  URL.revokeObjectURL(url);
}

function expThemeList() {
  const all = loadTkExp();
  const order = [];
  all.slice()
    .sort((a, b) => (b.date || b.created || 0) - (a.date || a.created || 0))
    .forEach(e => { if (e.theme && order.indexOf(e.theme) < 0) order.push(e.theme); });
  return order;
}
function expFmtDate(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}
function expProgressRow(step) {
  const build = { situation: 1, fear: 2, values: 3 };
  const log   = { outcome: 1, survived: 2 };
  let cur, total;
  if (build[step])    { cur = build[step]; total = 3; }
  else if (log[step]) { cur = log[step];   total = 2; }
  else return '';
  const dots = Array.from({ length: total }, (_, i) => {
    const n = i + 1;
    return `<span class="wt-dot ${n === cur ? 'active' : n < cur ? 'done' : ''}"></span>`;
  }).join('');
  return `<div class="wt-progress-row">
    <div class="wt-progress-dots">${dots}</div>
    <span style="font-family:var(--mono);font-size:11px;color:var(--ink-faint)">${cur}/${total}</span>
  </div>`;
}
function expValuesWarnHtml(text) {
  const looksLikeReduction = /anxi|nervous|less scared|less afraid|calm down|\brelax|feel better|stop feeling|feel less|feel calm/i.test(text || '');
  if (!looksLikeReduction) return '';
  return `<div class="exp-nudge" style="margin-top:2px">That sounds like it's about reducing the feeling. Try again — what do you <em>care about</em> that this connects to? A person, a goal, the kind of life you want to live.</div>`;
}

function expPersist(s, status) {
  const all = loadTkExp();
  let rec = s.exposureId ? all.find(x => x.id === s.exposureId) : null;
  if (!rec) {
    rec = { id: genId('exp'), created: Date.now() };
    all.push(rec);
    s.exposureId = rec.id;
  }
  rec.theme           = (s.theme || '').trim();
  rec.situation       = (s.situation || '').trim();
  rec.fear_prediction = (s.fear_prediction || '').trim();
  rec.values_link     = (s.values_link || '').trim();
  rec.outcome         = (s.outcome || '').trim();
  rec.survived        = s.survived || null;
  rec.status          = status;
  rec.date            = Date.now();
  saveTkExp(all);
  return rec;
}

    html += `<div class="wt-step-label">${escapeHtml(s.theme)}</div>`;
    html += `<div class="wt-step-heading">What actually happened?</div>`;
    html += `<div class="exp-recap"><div class="exp-recap-row"><div class="exp-recap-label">You predicted</div><div class="exp-recap-val">${escapeHtml(s.fear_prediction)}</div></div></div>`;
    html += `<textarea class="wt-textarea" id="exp-field" placeholder="What happened? How did it compare to what you predicted?">${escapeHtml(s.outcome)}</textarea>`;
    html += `<button class="wt-primary-btn" id="exp-next" ${s.outcome.trim() ? '' : 'disabled'}>Next →</button>`;
    html += `<button class="wt-back-btn" id="exp-back" style="margin-top:6px">← back</button>`;
  } else if (s.step === 'survived') {
    html += expProgressRow(s.step);
    html += `<div class="wt-step-label">${escapeHtml(s.theme)}</div>`;
    html += `<div class="wt-step-heading">Did you get through it?</div>`;
    html += `<div class="wt-tool-helper">Getting through it isn't the same as it going well. It means the thing happened — and you're still here.</div>`;
    html += `<div class="exp-survive-btns">
      <button class="wt-primary-btn" id="exp-surv-yes" style="margin-bottom:0">Yes</button>
      <button class="wt-secondary-btn" id="exp-surv-hard" style="margin-bottom:0">Yes — but it was hard</button>
    </div>`;
    html += `<details class="wt-helper-details"><summary style="cursor:pointer;font-family:var(--mono);font-size:11px;color:var(--ink-dim);list-style:none">Not sure you got through it?</summary>
      <p style="margin:10px 0 0;font-size:13px;color:var(--ink-dim);line-height:1.6">If you're here recording this, you got through it. The outcome may not have been what you hoped — but that's a separate question from survival. What you predicted you couldn't endure, you endured. That's the evidence worth keeping.</p></details>`;
    html += `<button class="wt-back-btn" id="exp-back" style="margin-top:14px">← back</button>`;
  }

  panel.innerHTML = html;

  if (s.step === 'theme') {
    const newInput = panel.querySelector('#exp-theme-new');
    const chips = panel.querySelectorAll('#exp-theme-chips .wt-chip');
    chips.forEach(c => c.addEventListener('click', () => {
      s.theme = c.dataset.theme;
      renderWorkthrough();
    }));
    newInput.addEventListener('input', () => {
      s.theme = newInput.value;
      const nb = panel.querySelector('#exp-next');
      if (nb) nb.disabled = !s.theme.trim();
      chips.forEach(c => c.classList.toggle('selected', c.dataset.theme === s.theme.trim()));
    });
    const recLink = panel.querySelector('#exp-view-record');
    if (recLink) recLink.addEventListener('click', () => {
      wtState.step = 0;
      tkHistTab = 'history';
      renderWorkthrough();
    });
  }

  const field = panel.querySelector('#exp-field');
  if (field) {
    field.addEventListener('input', () => {
      if (s.step === 'situation')    s.situation = field.value;
      else if (s.step === 'fear')    s.fear_prediction = field.value;
      else if (s.step === 'values')  s.values_link = field.value;
      else if (s.step === 'outcome') s.outcome = field.value;
      const nb = panel.querySelector('#exp-next');
      if (nb) nb.disabled = !field.value.trim();
      if (s.step === 'values') {
        const warn = panel.querySelector('#exp-values-warn');
        if (warn) warn.innerHTML = expValuesWarnHtml(field.value);
      }
    });
  }

  const nextBtn = panel.querySelector('#exp-next');
  if (nextBtn) nextBtn.addEventListener('click', () => {
    if (s.step === 'theme' && s.theme.trim())               { s.step = 'situation'; renderWorkthrough(); }
    else if (s.step === 'situation' && s.situation.trim())  { s.step = 'fear';      renderWorkthrough(); }
    else if (s.step === 'fear' && s.fear_prediction.trim()) { s.step = 'values';    renderWorkthrough(); }
    else if (s.step === 'values' && s.values_link.trim())   { s.step = 'ready';     renderWorkthrough(); }
    else if (s.step === 'outcome' && s.outcome.trim())      { s.step = 'survived';  renderWorkthrough(); }
  });

  const backBtnEl = panel.querySelector('#exp-back');
  if (backBtnEl) backBtnEl.addEventListener('click', () => {
    const map = { situation: 'theme', fear: 'situation', values: 'fear', ready: 'values', outcome: 'ready', survived: 'outcome' };
    s.step = map[s.step] || 'theme';
    renderWorkthrough();
  });

  const didItBtn = panel.querySelector('#exp-did-it');
  if (didItBtn) didItBtn.addEventListener('click', () => { s.step = 'outcome'; renderWorkthrough(); });

  const saveLaterBtn = panel.querySelector('#exp-save-later');
  if (saveLaterBtn) saveLaterBtn.addEventListener('click', () => {
    expPersist(s, 'pending');
    showSaved('Saved — come back when it\'s done');
    tkBackToLanding();
  });

  const finishExposure = (verdict) => {
    s.survived = verdict;
    expPersist(s, 'complete');
    showSaved('Logged — you survived it');
    panel.innerHTML = `
      <div class="wt-step-heading">Logged.</div>
      <div class="tk-note-card">Good job. This took courage. Most people avoid this their whole lives.</div>
      <button class="wt-primary-btn" id="exp-close" style="margin-top:8px">Close</button>
    `;
    panel.querySelector('#exp-close').addEventListener('click', tkBackToLanding);
  };
  const survYes  = panel.querySelector('#exp-surv-yes');
  const survHard = panel.querySelector('#exp-surv-hard');
  if (survYes)  survYes.addEventListener('click', () => finishExposure('yes'));
  if (survHard) survHard.addEventListener('click', () => finishExposure('yes_hard'));
}

function openReframeCheatsheet(onPick) {
  if (document.querySelector('.rcs-drawer')) return;
  const backdrop = document.createElement('div');
  backdrop.className = 'rcs-backdrop';
  const drawer = document.createElement('aside');
  drawer.className = 'rcs-drawer';
  drawer.setAttribute('role', 'dialog');
  drawer.setAttribute('aria-label', 'Thinking patterns');
  drawer.innerHTML = `
    <header class="rcs-head">
      <div>
        <div class="rcs-eyebrow">Cheatsheet</div>
        <div class="rcs-title">Thinking patterns</div>
      </div>
      <button class="rcs-close" aria-label="Close">×</button>
    </header>
    <div class="rcs-body">
      <p class="rcs-intro">Tap a pattern to see reframe prompts. Tap a prompt to add it to your notes.</p>
      <div class="rcs-list">
        ${PATTERNS.map(p => `
          <button class="rcs-pat" data-pid="${p.id}">
            <div class="rcs-pat-head">
              <div class="rcs-pat-name">${escapeHtml(p.label)}</div>
              <div class="rcs-pat-desc">${escapeHtml(p.description || '')}</div>
            </div>
            <span class="rcs-pat-chev">+</span>
          </button>
          <div class="rcs-thoughts" data-for="${p.id}" hidden>
            ${p.thoughts.map(t => `
              <button class="rcs-thought" data-t="${escapeHtml(t)}">
                <span class="rcs-thought-text">${escapeHtml(t)}</span>
                <span class="rcs-thought-add">+</span>
              </button>
            `).join('')}
          </div>
        `).join('')}
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  document.body.appendChild(drawer);
  requestAnimationFrame(() => { backdrop.classList.add('open'); drawer.classList.add('open'); });
  const close = () => {
    backdrop.classList.remove('open'); drawer.classList.remove('open');
    setTimeout(() => { backdrop.remove(); drawer.remove(); }, 300);
  };
  backdrop.addEventListener('click', close);
  drawer.querySelector('.rcs-close').addEventListener('click', close);
  drawer.querySelectorAll('.rcs-pat').forEach(btn => {
    btn.addEventListener('click', () => {
      const pid = btn.dataset.pid;
      const block = drawer.querySelector(`.rcs-thoughts[data-for="${pid}"]`);
      if (!block) return;
      const isHidden = block.hasAttribute('hidden');
      if (isHidden) { block.removeAttribute('hidden'); btn.classList.add('open'); btn.querySelector('.rcs-pat-chev').textContent = '−'; }
      else { block.setAttribute('hidden', ''); btn.classList.remove('open'); btn.querySelector('.rcs-pat-chev').textContent = '+'; }
    });
  });
  drawer.querySelectorAll('.rcs-thought').forEach(btn => {
    btn.addEventListener('click', () => {
      onPick(btn.dataset.t);
      btn.classList.add('inserted');
      setTimeout(() => { btn.classList.remove('inserted'); }, 900);
    });
  });
}

function renderToolThoughtRecord(panel) {
  const s = wtState.draft._tc || {
    branch: null,
    rumStep: 1, ruminationText: '', symptoms: [], customSymptom: '', newInfoEmerging: null, chosenAction: '',
    intStep: 1, intContext: '', intIntrusion: '', intAction: '',
  };
  wtState.draft._tc = s;
  if (s.intStep === undefined)     s.intStep = 1;
  if (s.intContext === undefined)  s.intContext = '';
  if (s.intIntrusion === undefined) s.intIntrusion = '';
  if (s.intAction === undefined)   s.intAction = '';
  panel.dataset.branch = s.branch || '';

  const header = (cur, total, label) => {
    const dots = Array.from({ length: total }, (_, i) => {
      const n = i + 1;
      return `<span class="wt-dot ${n === cur ? 'active' : n < cur ? 'done' : ''}"></span>`;
    }).join('');
    return `
      <div class="wt-progress-row">
        <div class="wt-progress-dots">${dots}</div>
        <span style="font-family:var(--mono);font-size:11px;color:var(--ink-faint)">${cur}/${total}</span>
      </div>
      <div class="wt-step-label">${escapeHtml(label)}</div>`;
  };

  if (s.branch === null) {
    panel.innerHTML = `
      <div class="tc-question">What do you need <em>right now</em>?</div>
      <div class="tc-cards">
        <button class="tc-card tc-card--sky" id="tc-rum">
          <div class="tc-card-body">
            <div class="tc-tag">反芻</div>
            <div class="tc-card-title">Rumination Break</div>
            <div class="tc-card-sub">To interrupt the rumination loop, and reset.</div>
          </div>
          <span class="tc-card-arrow">→</span>
        </button>
        <button class="tc-card tc-card--sage" id="tc-int">
          <div class="tc-card-body">
            <div class="tc-tag">閃念</div>
            <div class="tc-card-title">Intrusion Check</div>
            <div class="tc-card-sub">To check a flashing negative thought.</div>
          </div>
          <span class="tc-card-arrow">→</span>
        </button>
      </div>
    `;
    panel.querySelector('#tc-rum').addEventListener('click', () => { s.branch = 'rumination'; renderWorkthrough(); });
    panel.querySelector('#tc-int').addEventListener('click', () => { s.branch = 'intrusion_check'; renderWorkthrough(); });
    return;
  }

  if (s.branch === 'rumination') {
    const RUM_TOTAL = 4;
    if (s.rumStep === 1) {
      panel.innerHTML = `
        ${header(1, RUM_TOTAL, 'Name it')}
        <div class="wt-step-heading">What are you ruminating about?</div>
        <textarea class="wt-textarea" id="rb-rumination" placeholder="Whirling thoughts..." style="min-height:100px">${escapeHtml(s.ruminationText)}</textarea>
        <button class="wt-primary-btn" id="rb-next">Next →</button>
        <button class="wt-back-btn" id="rb-prev" style="margin-top:8px">← back</button>
      `;
      const ta = panel.querySelector('#rb-rumination');
      ta.addEventListener('input', () => { s.ruminationText = ta.value; });
      panel.querySelector('#rb-next').addEventListener('click', () => { s.ruminationText = ta.value; s.rumStep = 2; renderWorkthrough(); });
      panel.querySelector('#rb-prev').addEventListener('click', () => { s.ruminationText = ta.value; s.branch = null; renderWorkthrough(); });
      return;
    }
    if (s.rumStep === 2) {
      const SYM_OPTIONS = [
        'repeating same thought loops',
        'searching endlessly for moral closure',
        'mentally rehearsing old arguments',
        'trying to "solve" unfairness globally',
        'stalking people online',
      ];
      panel.innerHTML = `
        ${header(2, RUM_TOTAL, 'Symptoms')}
        <div class="wt-step-heading">What are your symptoms?</div>
        <div class="wt-chips-row" id="rb-sym-chips">
          ${SYM_OPTIONS.map(o => `<button class="wt-chip${s.symptoms.includes(o) ? ' selected' : ''}" data-sym="${escapeHtml(o)}">${escapeHtml(o)}</button>`).join('')}
        </div>
        <textarea class="wt-textarea" id="rb-custom-sym" placeholder="Other…" style="min-height:60px;margin-top:4px">${escapeHtml(s.customSymptom)}</textarea>
        <div class="wt-step-heading" style="margin-top:18px">Is there new information emerging?</div>
        <div class="wt-chips-row" id="rb-newinfo-chips">
          <button class="wt-chip${s.newInfoEmerging === 'yes' ? ' selected' : ''}" data-newinfo="yes">Yes</button>
          <button class="wt-chip${s.newInfoEmerging === 'no' ? ' selected' : ''}" data-newinfo="no">No</button>
        </div>
        <button class="wt-primary-btn" id="rb-next" style="margin-top:8px">Next →</button>
        <button class="wt-back-btn" id="rb-prev" style="margin-top:8px">← back</button>
      `;
      panel.querySelectorAll('#rb-sym-chips .wt-chip').forEach(btn => {
        btn.addEventListener('click', () => {
          const sym = btn.dataset.sym;
          if (s.symptoms.includes(sym)) s.symptoms = s.symptoms.filter(x => x !== sym);
          else s.symptoms = [...s.symptoms, sym];
          btn.classList.toggle('selected', s.symptoms.includes(sym));
        });
      });
      const customTa = panel.querySelector('#rb-custom-sym');
      customTa.addEventListener('input', () => { s.customSymptom = customTa.value; });
      panel.querySelectorAll('#rb-newinfo-chips .wt-chip').forEach(btn => {
        btn.addEventListener('click', () => {
          s.newInfoEmerging = btn.dataset.newinfo;
          panel.querySelectorAll('#rb-newinfo-chips .wt-chip').forEach(b => b.classList.toggle('selected', b === btn));
        });
      });
      panel.querySelector('#rb-next').addEventListener('click', () => { s.customSymptom = customTa.value; s.rumStep = 3; renderWorkthrough(); });
      panel.querySelector('#rb-prev').addEventListener('click', () => { s.customSymptom = customTa.value; s.rumStep = 1; renderWorkthrough(); });
      return;
    }
    if (s.rumStep === 3) {
      panel.innerHTML = `
        ${header(3, RUM_TOTAL, 'Acknowledge')}
        <div class="tk-note-card">This is your mind doing what minds do — and it happens to everyone. You don't have to solve this right now. You don't have to follow it.</div>
        <button class="wt-primary-btn" id="rb-next">Next →</button>
        <button class="wt-back-btn" id="rb-prev" style="margin-top:8px">← back</button>
      `;
      panel.querySelector('#rb-next').addEventListener('click', () => { s.rumStep = 4; renderWorkthrough(); });
      panel.querySelector('#rb-prev').addEventListener('click', () => { s.rumStep = 2; renderWorkthrough(); });
      return;
    }
    const REDIRECTS = ['Stand up and stretch', 'Get a glass of water', 'Wash your face', 'Step outside for a minute', 'Do a calming exercise (home → calm)'];
    panel.innerHTML = `
      ${header(4, RUM_TOTAL, 'Break the loop')}
      <div class="wt-step-heading">Pick one thing to do right now:</div>
      <div class="tk-redirect-options">
        ${REDIRECTS.map(a => `<button class="tk-redirect-btn" data-action="${escapeHtml(a)}">${escapeHtml(a)}</button>`).join('')}
      </div>
      <button class="wt-back-btn" id="rb-prev" style="margin-top:14px">← back</button>
    `;
    panel.querySelectorAll('.tk-redirect-btn[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        s.chosenAction = btn.dataset.action;
        panel.innerHTML = `
          <div class="wt-step-heading">Good.</div>
          <div class="wt-tool-helper" style="margin-bottom:10px">Come back to this when you're ready.</div>
          <div class="tk-save-row">
            <button class="wt-primary-btn" id="rb-save">Save</button>
            <button class="tk-discard-btn" id="rb-skip">Skip</button>
          </div>
        `;
        panel.querySelector('#rb-save').addEventListener('click', () => {
          tkSaveRecord('rumination_break', { action: s.chosenAction, ruminationText: s.ruminationText, symptoms: s.symptoms, customSymptom: s.customSymptom, newInfoEmerging: s.newInfoEmerging });
          showSaved('Record saved');
          tkBackToLanding();
        });
        panel.querySelector('#rb-skip').addEventListener('click', tkBackToLanding);
      });
    });
    panel.querySelector('#rb-prev').addEventListener('click', () => { s.rumStep = 3; renderWorkthrough(); });
    return;
  }

  if (s.branch === 'intrusion_check') {
    const INT_TOTAL = 4;

    if (s.intStep === 1) {
      panel.innerHTML = `
        ${header(1, INT_TOTAL, 'Context')}
        <div class="wt-step-heading">How were you feeling before the thought appeared?</div>
        <textarea class="wt-textarea" id="int-context" placeholder="I woke up to a beautiful morning." style="min-height:100px">${escapeHtml(s.intContext)}</textarea>
        <button class="wt-primary-btn" id="int-next">Next →</button>
        <button class="wt-back-btn" id="int-prev" style="margin-top:8px">← back</button>
      `;
      const ta = panel.querySelector('#int-context');
      ta.addEventListener('input', () => { s.intContext = ta.value; });
      panel.querySelector('#int-next').addEventListener('click', () => { s.intContext = ta.value; s.intStep = 2; renderWorkthrough(); });
      panel.querySelector('#int-prev').addEventListener('click', () => { s.intContext = ta.value; s.branch = null; renderWorkthrough(); });
      return;
    }

    if (s.intStep === 2) {
      panel.innerHTML = `
        ${header(2, INT_TOTAL, 'Intrusion')}
        <div class="wt-step-heading">What thought flashed through your mind? Is anything actually happening right now that supports the fear?</div>
        <textarea class="wt-textarea" id="int-intrusion" placeholder="I thought about someone whom I don't like but appears successful. There is no real danger." style="min-height:120px">${escapeHtml(s.intIntrusion)}</textarea>
        <button class="wt-primary-btn" id="int-next" style="margin-top:8px">Next →</button>
        <button class="wt-back-btn" id="int-prev" style="margin-top:8px">← back</button>
      `;
      const ta = panel.querySelector('#int-intrusion');
      ta.addEventListener('input', () => { s.intIntrusion = ta.value; });
      panel.querySelector('#int-next').addEventListener('click', () => { s.intIntrusion = ta.value; s.intStep = 3; renderWorkthrough(); });
      panel.querySelector('#int-prev').addEventListener('click', () => { s.intIntrusion = ta.value; s.intStep = 1; renderWorkthrough(); });
      return;
    }

    if (s.intStep === 3) {
      panel.innerHTML = `
        ${header(3, INT_TOTAL, 'Gentle Reminder')}
        <div class="tk-note-card">Your brain may be trying to keep you alert because staying vigilant once helped you stay safe.<br><br>This thought is an old protective alarm, not necessarily your true belief.<br><br>You can acknowledge the warning without obeying it.<br><br>Right now, pause and look around: Are you actually unsafe, or just reminded of old danger?<br><br>It's okay to remain in this good moment.</div>
        <button class="wt-primary-btn" id="int-next" style="margin-top:14px">Next →</button>
        <button class="wt-back-btn" id="int-prev" style="margin-top:8px">← back</button>
      `;
      panel.querySelector('#int-next').addEventListener('click', () => { s.intStep = 4; renderWorkthrough(); });
      panel.querySelector('#int-prev').addEventListener('click', () => { s.intStep = 2; renderWorkthrough(); });
      return;
    }

    const REDIRECTS = ['Stand up and stretch', 'Get a glass of water', 'Wash your face', 'Step outside for a minute', 'Do a calming exercise (home → calm)'];
    panel.innerHTML = `
      ${header(4, INT_TOTAL, 'Return')}
      <div class="wt-step-heading">Pick one thing to do right now:</div>
      <div class="tk-redirect-options">
        ${REDIRECTS.map(a => `<button class="tk-redirect-btn" data-action="${escapeHtml(a)}">${escapeHtml(a)}</button>`).join('')}
      </div>
      <button class="wt-back-btn" id="int-prev" style="margin-top:14px">← back</button>
    `;
    panel.querySelectorAll('.tk-redirect-btn[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        s.intAction = btn.dataset.action;
        panel.innerHTML = `
          <div class="wt-step-heading">Good.</div>
          <div class="wt-tool-helper" style="margin-bottom:10px">Come back to this when you're ready.</div>
          <div class="tk-save-row">
            <button class="wt-primary-btn" id="int-save">Save</button>
            <button class="tk-discard-btn" id="int-skip">Skip</button>
          </div>
        `;
        panel.querySelector('#int-save').addEventListener('click', () => {
          tkSaveRecord('intrusion_check', { context: s.intContext, intrusion: s.intIntrusion, action: s.intAction });
          showSaved('Record saved');
          tkBackToLanding();
        });
        panel.querySelector('#int-skip').addEventListener('click', tkBackToLanding);
      });
    });
    panel.querySelector('#int-prev').addEventListener('click', () => { s.intStep = 3; renderWorkthrough(); });
    return;
  }

}

function renderToolThoughtWorkthrough(panel) {
  const s = wtState.draft._twt || {
    branch: null, step: 1,
    situation: '', immediateReaction: '', thought: '', protectionFrom: '', cbt: '', act: '',
    severity: null, action: '',
    protection: { reduce: '', document: '', support: '', exit: '', seek: '' },
    reframeNotes: '',
    situation: '', dread: '', reality: '', act: '', copingPlan: '', prepStep: '',
  };
  wtState.draft._twt = s;
  if (s.branch === undefined) s.branch = null;
  if (s.severity === undefined) s.severity = null;
  if (!s.protection) s.protection = { reduce: '', document: '', support: '', exit: '', seek: '' };
  if (s.reframeNotes === undefined) s.reframeNotes = '';
  if (s.immediateReaction === undefined) s.immediateReaction = '';
  if (s.protectionFrom === undefined) s.protectionFrom = '';
  if (s.thoughtIsAboutSelf === undefined) s.thoughtIsAboutSelf = null;
  if (s.selfAsFriend === undefined) s.selfAsFriend = '';
  if (s.situation === undefined) s.situation = '';
  if (s.dread === undefined) s.dread = '';
  if (s.reality === undefined) s.reality = '';
  if (s.act === undefined) s.act = '';
  if (s.copingPlan === undefined) s.copingPlan = '';
  if (s.prepStep === undefined) s.prepStep = '';
  panel.dataset.branch = s.branch || '';

  if (s.branch === null) {
    panel.innerHTML = `
      <div class="tc-question">Is this something that <em>already happened</em>, or something coming up?</div>
      <div class="tc-cards">
        <button class="tc-card tc-card--slate" id="sc-past">
          <div class="tc-card-body">
            <div class="tc-tag">過去</div>
            <div class="tc-card-title">Past · Process</div>
            <div class="tc-card-sub">Process a past event and figure out what to do.</div>
          </div>
          <span class="tc-card-arrow">→</span>
        </button>
        <button class="tc-card tc-card--amber" id="sc-future">
          <div class="tc-card-body">
            <div class="tc-tag">未来</div>
            <div class="tc-card-title">Future · Plan</div>
            <div class="tc-card-sub">Think through an upcoming event and have a plan.</div>
          </div>
          <span class="tc-card-arrow">→</span>
        </button>
      </div>
    `;
    panel.querySelector('#sc-past').addEventListener('click', () => { s.branch = 'past'; s.step = 1; renderWorkthrough(); });
    panel.querySelector('#sc-future').addEventListener('click', () => { s.branch = 'future'; s.step = 1; renderWorkthrough(); });
    return;
  }

  const total = (s.branch === 'past') ? 8 : 6;
  const dotsHtml = Array.from({ length: total }, (_, i) => {
    const n = i + 1;
    return `<span class="wt-dot ${n === s.step ? 'active' : n < s.step ? 'done' : ''}"></span>`;
  }).join('');
  const header = (label) => `
    <div class="wt-progress-row">
      <div class="wt-progress-dots">${dotsHtml}</div>
      <span style="font-family:var(--mono);font-size:11px;color:var(--ink-faint)">${s.step}/${total}</span>
    </div>
    <div class="wt-step-label">${escapeHtml(label)}</div>`;

  const LEVERS = [
    { key: 'reduce',   label: 'Reduce exposure', prompt: 'Is there a way to limit your contact with this situation while you figure out next steps?',
      hint: 'I can stop sharing work-in-progress with them directly and route updates through email so there\'s a record.' },
    { key: 'document', label: 'Document',        prompt: 'What specifically do you want to record, and where?',
      hint: 'Dates, meetings, specific things said, who was in the room. Kept somewhere outside work systems.' },
    { key: 'support',  label: 'Support network', prompt: 'Who in your life could you tell about this?',
      hint: 'A trusted colleague who\'s witnessed it. Someone in HR I can speak to informally. A mentor outside the company.' },
    { key: 'exit',     label: 'Exit plan',       prompt: 'What would getting out actually look like — this week, this month?',
      hint: 'Updating my CV now. Starting to have quiet conversations with my network. Not waiting until I\'m desperate.' },
    { key: 'seek',     label: 'Seek support',    prompt: 'Is this something you want to talk through with someone you trust?',
      hint: 'This is worth talking through with someone I trust — not to vent, but to think clearly about my options.' },
  ];

  if (s.branch === 'past') {
    const PAST_STEPS = {
      1: { label: 'Situation',          field: 'situation',         prompt: 'What\'s happening? What triggered you?',
           mild:    'Manager gave me critical feedback — specific things they said they want me to do differently. //',
           serious: 'My manager has been consistently undermining me in meetings and taking credit for my work. It\'s been going on for months.' },
      2: { label: 'Immediate reaction', field: 'immediateReaction', prompt: 'How do you feel? What\'s your immediate reaction?',
           mild:    'Defensive. Want to explain myself and justify every decision I made. //',
           serious: 'Want to go quiet, stop contributing, make myself invisible.' },
      4: { label: 'CBT check',          field: 'cbt',               prompt: 'What are evidence for and against this belief? Is there a more accurate way to read this?',
           mild:    'Critical feedback is normal and often a sign they\'re invested in you. One conversation isn\'t a verdict on your performance. //',
           serious: 'I may have less power than my manager, but I\'m not powerless. There are people and options I haven\'t fully explored yet.' },
      6: { label: 'ACT check',          field: 'act',               prompt: 'Even if this is true, what do you want to do? Would you like to respond differently than your immediate reaction?',
           mild:    'Even if I have been underperforming, that\'s actionable. I want to listen properly rather than defend. //',

    };

    const showPastDone = () => {
      const data = {
        branch: 'past', severity: s.severity,
        situation: s.situation, immediateReaction: s.immediateReaction,
        thought: s.thought, protectionFrom: s.protectionFrom,
        cbt: s.cbt, act: s.act,
        reframeNotes: s.reframeNotes,
        thoughtIsAboutSelf: s.thoughtIsAboutSelf, selfAsFriend: s.selfAsFriend,
      };
      if (s.severity === 'serious') {
        data.protection = { ...s.protection };
        panel.innerHTML = `
          <div class="wt-step-heading">Done.</div>

          <div class="tk-save-row">
            <button class="wt-primary-btn" id="twt-save">Save</button>
            <button class="tk-discard-btn" id="twt-discard">Skip</button>
          </div>

      } else {

        panel.innerHTML = `
          <div class="wt-step-heading">Done.</div>
          <div class="wt-tool-helper" style="margin-bottom:8px">Your action: <em>${escapeHtml(s.action || '—')}</em></div>
          <div class="tk-note-card">Good job. You've done something most people don't — you stopped and thought it through.</div>
          <div class="tk-save-row">
            <button class="wt-primary-btn" id="twt-save">Save</button>
            <button class="tk-discard-btn" id="twt-discard">Skip</button>
          </div>
        `;
      }
      panel.querySelector('#twt-save').addEventListener('click', () => { tkSaveRecord('situation_debrief', data); showSaved('Saved'); tkBackToLanding(); });
      panel.querySelector('#twt-discard').addEventListener('click', tkBackToLanding);
    };

    if (s.step === 3) {
      const beliefMild = 'I\'m failing at my job. //';
      const beliefSerious = 'I\'m powerless and nothing I do will change this.';
      panel.innerHTML = `
        ${header('The thought')}
        <div class="wt-step-heading">What belief made you feel this way?</div>
        <textarea class="wt-textarea" id="twt-thought" placeholder="${escapeHtml(beliefMild + '\n' + beliefSerious)}" style="min-height:130px">${escapeHtml(s.thought)}</textarea>
        <div class="sc-row">
          <span class="wt-tool-helper">Is this belief about yourself?</span>
          <button type="button" class="sc-chip ${s.thoughtIsAboutSelf === 'yes' ? 'selected' : ''}" data-sf="yes">Yes</button>
          <button type="button" class="sc-chip ${s.thoughtIsAboutSelf === 'no' ? 'selected' : ''}" data-sf="no">No</button>
        </div>
        ${s.thoughtIsAboutSelf === 'yes' ? `
          <div class="wt-tool-helper" style="margin-top:12px">What would you say to a friend who told you this about themselves?</div>
          <textarea class="rcs-notes-textarea" id="twt-friend" placeholder="She is being really hard on herself." style="min-height:90px">${escapeHtml(s.selfAsFriend)}</textarea>
        ` : ''}
        <button class="wt-primary-btn" id="twt-next" style="margin-top:4px">Next →</button>
        <button class="wt-back-btn" id="twt-prev" style="margin-top:8px">← back</button>
      `;
      const save3 = () => {
        const t = panel.querySelector('#twt-thought'); if (t) s.thought = t.value;
        const fr = panel.querySelector('#twt-friend'); if (fr) s.selfAsFriend = fr.value;
      };
      panel.querySelectorAll('[data-sf]').forEach(btn => {
        btn.addEventListener('click', () => { save3(); s.thoughtIsAboutSelf = btn.dataset.sf; renderWorkthrough(); });
      });
      panel.querySelector('#twt-next').addEventListener('click', () => { save3(); s.step = 4; renderWorkthrough(); });
      panel.querySelector('#twt-prev').addEventListener('click', () => { save3(); s.step = 2; renderWorkthrough(); });
      return;
    }

    if (s.step === 5) {
      panel.innerHTML = `
        ${header('Belief check')}
        <div class="wt-step-heading">You've checked your belief. What would you like to do next?</div>
        <button class="wt-primary-btn" id="twt-triage-done">Glad I checked my belief — I am done</button>
        <button class="wt-primary-btn" id="twt-triage-continue" style="margin-top:8px">Even if my belief were true…</button>
        <button class="wt-back-btn" id="twt-prev" style="margin-top:8px">← back</button>
      `;
      panel.querySelector('#twt-triage-done').addEventListener('click', () => { showPastDone(); });
      panel.querySelector('#twt-triage-continue').addEventListener('click', () => { s.step = 6; renderWorkthrough(); });
      panel.querySelector('#twt-prev').addEventListener('click', () => { s.step = 4; renderWorkthrough(); });
      return;
    }

    if (s.step === 1 || s.step === 2 || s.step === 4 || s.step === 6) {
      const pst = PAST_STEPS[s.step];
      const isCbt = (s.step === 4);
      const isImmediate = (s.step === 2);
      const placeholder = `${pst.mild}\n${pst.serious}`;
      const protectMild2 = 'The defensiveness is protecting me from having to admit they might be right. //';
      const protectSerious2 = 'Going quiet is protecting me from more humiliation.';
      panel.innerHTML = `
        ${header(pst.label)}
        <div class="wt-step-heading">${escapeHtml(pst.prompt)}</div>
        <textarea class="wt-textarea" id="twt-field" placeholder="${escapeHtml(placeholder)}" style="min-height:160px">${escapeHtml(s[pst.field])}</textarea>
        ${isCbt ? `
          <button type="button" class="rcs-trigger" id="twt-cheat">Not sure where to start? Browse thinking patterns →</button>
          <div class="rcs-notes-label">Reframe prompts</div>
          <textarea class="rcs-notes-textarea" id="twt-reframe" placeholder="Tap patterns in the drawer to collect prompts here, or write your own.">${escapeHtml(s.reframeNotes)}</textarea>
        ` : ''}
        ${isImmediate ? `
          <div class="wt-tool-helper" style="margin-top:14px">Is your immediate reaction trying to protect you from something?</div>
          <textarea class="wt-textarea" id="twt-protect" placeholder="${escapeHtml(protectMild2 + '\n' + protectSerious2)}" style="min-height:120px">${escapeHtml(s.protectionFrom)}</textarea>
        ` : ''}
        <button class="wt-primary-btn" id="twt-next">Next →</button>
        <button class="wt-back-btn" id="twt-prev" style="margin-top:8px">← back</button>
      `;
      const save = () => {
        const el = panel.querySelector('#twt-field'); if (el) s[pst.field] = el.value;
        const re = panel.querySelector('#twt-reframe'); if (re) s.reframeNotes = re.value;
        const pr = panel.querySelector('#twt-protect'); if (pr) s.protectionFrom = pr.value;
      };
      if (isCbt) {
        const reTa = panel.querySelector('#twt-reframe');
        reTa.addEventListener('input', () => { s.reframeNotes = reTa.value; });
        panel.querySelector('#twt-cheat').addEventListener('click', () => {
          save();
          openReframeCheatsheet((t) => {
            const curVal = reTa.value;
            reTa.value = curVal ? (curVal.trim() + '\n' + t) : t;
            s.reframeNotes = reTa.value;
          });
        });
      }
      panel.querySelector('#twt-next').addEventListener('click', () => { save(); s.step++; renderWorkthrough(); });
      panel.querySelector('#twt-prev').addEventListener('click', () => {
        save();
        if (s.step === 1) { s.branch = null; } else { s.step--; }
        renderWorkthrough();
      });
      return;
    }

    if (s.step === 7) {
      panel.innerHTML = `
        ${header('Severity check')}
        <div class="wt-step-heading">Is this a one-time situation, or something ongoing and serious?</div>
        <button class="wt-primary-btn" id="twt-sev-onetime">A one-time situation</button>
        <button class="wt-primary-btn" id="twt-sev-serious" style="margin-top:8px">Ongoing and serious</button>
        <button class="wt-back-btn" id="twt-prev" style="margin-top:8px">← back</button>
      `;
      panel.querySelector('#twt-sev-onetime').addEventListener('click', () => { s.severity = 'onetime'; s.step = 8; renderWorkthrough(); });
      panel.querySelector('#twt-sev-serious').addEventListener('click', () => { s.severity = 'serious'; s.step = 8; renderWorkthrough(); });
      panel.querySelector('#twt-prev').addEventListener('click', () => { s.step = 6; renderWorkthrough(); });
      return;
    }

    if (s.severity === 'serious') {
      panel.innerHTML = `
        ${header('Real-world action')}
        <div class="tk-note-card">Some situations aren't solved by thinking differently — they need real-world action. You're not overreacting.\nRecognizing when something is genuinely hard is not weakness — it's clarity.</div>
        <div class="wt-step-heading">Here are the levers you have. Which feel relevant?</div>
        ${LEVERS.map(l => `
          <div class="wt-tool-label" style="margin-top:14px">${escapeHtml(l.label)}</div>
          <div class="wt-tool-helper" style="margin-bottom:6px">${escapeHtml(l.prompt)}</div>
          <textarea class="wt-textarea" id="twt-lever-${l.key}" placeholder="${escapeHtml(l.hint)}" style="min-height:90px">${escapeHtml(s.protection[l.key])}</textarea>
        `).join('')}
        <button class="wt-primary-btn" id="twt-next" style="margin-top:6px">Finish</button>
        <button class="wt-back-btn" id="twt-prev" style="margin-top:8px">← back</button>
      `;
      const saveLevers = () => { LEVERS.forEach(l => { const el = panel.querySelector(`#twt-lever-${l.key}`); if (el) s.protection[l.key] = el.value; }); };
      LEVERS.forEach(l => { const el = panel.querySelector(`#twt-lever-${l.key}`); if (el) el.addEventListener('input', () => { s.protection[l.key] = el.value; }); });
      panel.querySelector('#twt-next').addEventListener('click', () => { saveLevers(); showPastDone(); });
      panel.querySelector('#twt-prev').addEventListener('click', () => { saveLevers(); s.severity = null; s.step = 7; renderWorkthrough(); });
      return;
    }

    panel.innerHTML = `
      ${header('Small action')}
      <div class="wt-step-heading">One concrete thing you can do today.</div>
      <textarea class="wt-textarea" id="twt-field" placeholder="Reply thanking them and asking one clarifying question rather than explaining myself." style="min-height:110px">${escapeHtml(s.action)}</textarea>
      <button class="wt-primary-btn" id="twt-next">Finish</button>
      <button class="wt-back-btn" id="twt-prev" style="margin-top:8px">← back</button>
    `;
    const ta = panel.querySelector('#twt-field');
    ta.addEventListener('input', () => { s.action = ta.value; });
    panel.querySelector('#twt-next').addEventListener('click', () => { s.action = ta.value; showPastDone(); });
    panel.querySelector('#twt-prev').addEventListener('click', () => { s.action = ta.value; s.severity = null; s.step = 7; renderWorkthrough(); });
    return;
  }

  // Future branch
  const FUTURE_STEPS = {
    1: { label: 'Situation',          field: 'situation',        prompt: 'What\'s coming up?',
         hint: 'You have a performance review coming up and you\'re not sure how it\'s going to go — your mind keeps running worst-case scenarios.' },
    2: { label: 'Immediate reaction', field: 'immediateReaction', prompt: 'How do you feel?',
         hint: 'Anxious. Already running worst-case scenarios and I haven\'t even walked in yet.' },
    3: { label: 'The dread',          field: 'dread',             prompt: 'What\'s the specific outcome you\'re concerned with?',
         hint: 'They\'re going to tell me I\'m not meeting expectations and it will confirm everything I\'ve been afraid of.' },
    4: { label: 'Reality check',      field: 'reality',           prompt: 'Is this outcome actually likely?',
         hint: 'I don\'t actually know what they\'re going to say. I\'ve been functional and delivering — I\'m predicting disaster without evidence.' },
    5: { label: 'ACT check',          field: 'copingPlan',        prompt: 'If it does happen, how will you handle it? Have you handled similarly difficult things before?',
         hint: 'I\'ve handled difficult conversations before and I can handle this one. If they raise concerns: I\'ll listen fully before responding, ask for specific examples, and ask what support is available.' },
    6: { label: 'Prep step',          field: 'prepStep',          prompt: 'One concrete thing you can do before it happens.',
         hint: 'Write down three things I\'ve delivered this quarter so I\'m not going in empty-handed.' },
  };

  const showFutureClosing = () => {
    panel.innerHTML = `
      <div class="tk-note-card">Worrying about things you care about is human. You took the steps and did what you can.\nYou have a plan.\nNo more value in worrying further now.</div>
      <button class="wt-primary-btn" id="twt-close">Close</button>
    `;
    panel.querySelector('#twt-close').addEventListener('click', tkBackToLanding);
  };

  const showFutureSave = () => {
    panel.innerHTML = `
      <div class="wt-step-heading">Done.</div>
      <div class="wt-tool-helper" style="margin-bottom:16px">Save this plan to come back to later?</div>
      <div class="tk-save-row">
        <button class="wt-primary-btn" id="twt-save">Save</button>
        <button class="tk-discard-btn" id="twt-discard">Skip</button>
      </div>
    `;
    panel.querySelector('#twt-save').addEventListener('click', () => {
      tkSaveRecord('situation_debrief', {
        branch: 'future',
        situation: s.situation, immediateReaction: s.immediateReaction, protectionFrom: s.protectionFrom,
        dread: s.dread, reality: s.reality, copingPlan: s.copingPlan, prepStep: s.prepStep,
      });
      showSaved('Saved');
      showFutureClosing();
    });
    panel.querySelector('#twt-discard').addEventListener('click', showFutureClosing);
  };

  const fst = FUTURE_STEPS[s.step];
  const isLast = (s.step === 6);
  const isFutureImmediate = (s.step === 2);
  const futureProtectHint = 'The anxiety is protecting me from being caught off guard — if I expect the worst, I won\'t be blindsided.';
  panel.innerHTML = `
    ${header(fst.label)}
    <div class="wt-step-heading">${escapeHtml(fst.prompt)}</div>
    <textarea class="wt-textarea" id="twt-field" placeholder="${escapeHtml(fst.hint)}" style="min-height:120px">${escapeHtml(s[fst.field])}</textarea>
    ${isFutureImmediate ? `
      <div class="wt-tool-helper" style="margin-top:14px">Is your feeling trying to protect you from something?</div>
      <textarea class="wt-textarea" id="twt-protect" placeholder="${escapeHtml(futureProtectHint)}" style="min-height:120px">${escapeHtml(s.protectionFrom)}</textarea>
    ` : ''}
    <button class="wt-primary-btn" id="twt-next">${isLast ? 'Finish' : 'Next →'}</button>
    <button class="wt-back-btn" id="twt-prev" style="margin-top:8px">← back</button>
  `;
  const fsave = () => {
    const el = panel.querySelector('#twt-field'); if (el) s[fst.field] = el.value;
    const pr = panel.querySelector('#twt-protect'); if (pr) s.protectionFrom = pr.value;
  };
  panel.querySelector('#twt-next').addEventListener('click', () => { fsave(); if (isLast) showFutureSave(); else { s.step++; renderWorkthrough(); } });
  panel.querySelector('#twt-prev').addEventListener('click', () => { fsave(); if (s.step === 1) { s.branch = null; } else { s.step--; } renderWorkthrough(); });
}

      </div>

      tkSaveRecord('values_compass', {
        branch: 'injustice',

        injMeaning: s.injMeaning, injAgency: s.injAgency, injAction: s.injAction,
      });

    if (s.step === 1) {

    } else if (s.step === 2) {
      panel.innerHTML = `

        <textarea class="wt-textarea" id="ij-identity" placeholder="Someone who holds justice as a standard, not a guarantee. Someone who shows up for others." style="min-height:140px">${escapeHtml(s.injIdentity)}</textarea>

      panel.querySelector('#ij-next').addEventListener('click', () => { s.step = 'done'; renderWorkthrough(); });
      panel.querySelector('#ij-prev').addEventListener('click', () => { s.step = 4; renderWorkthrough(); });
    } else if (s.step === 'done') {
      panel.innerHTML = `
        <div class="wt-step-heading">Done.</div>
        <div class="wt-tool-helper" style="margin-bottom:16px">Your intention: <em>${escapeHtml(s.injAction || '—')}</em></div>
        <div class="tk-save-row">
          <button class="wt-primary-btn" id="ij-save">Save</button>
          <button class="tk-discard-btn" id="ij-discard">Skip</button>
        </div>
      `;
      panel.querySelector('#ij-save').addEventListener('click', injSaveRecord);
      panel.querySelector('#ij-discard').addEventListener('click', tkBackToLanding);
    }
    return;
  }

  const vcSaveRecord = () => {
    tkSaveRecord('values_compass', {
      branch: 'alignment',
      domain: s.domain, personStatement: s.personStatement,
      closeness: s.closeness, action: s.action, sizeChoice: s.sizeChoice,
    });
    showSaved('Saved');
    tkBackToLanding();
  };

  const VC_TOTAL = 4;
  const vcHeader = (cur, label) => `
    <div class="wt-progress-row">
      <div class="wt-progress-dots">${Array.from({ length: VC_TOTAL }, (_, i) => {
        const n = i + 1;
        return `<span class="wt-dot ${n === cur ? 'active' : n < cur ? 'done' : ''}"></span>`;
      }).join('')}</div>
      <span style="font-family:var(--mono);font-size:11px;color:var(--ink-faint)">${cur}/${VC_TOTAL}</span>
    </div>
    <div class="wt-step-label">${escapeHtml(label)}</div>`;

  if (s.step === 1) {
    const isCustom = s.domain && !DOMAINS.includes(s.domain);
    panel.innerHTML = `
      ${vcHeader(1, 'Domain')}
      <div class="wt-step-heading">Pick an area of life.</div>
      <div class="tk-domain-chips">
        ${DOMAINS.map(d => `<button class="wt-chip ${s.domain === d ? 'selected' : ''}" data-domain="${escapeHtml(d)}">${escapeHtml(d)}</button>`).join('')}
      </div>
      <input class="wt-input" id="vc-custom-domain" type="text" placeholder="Custom" style="margin-top:0px;margin-bottom:14px" value="${isCustom ? escapeHtml(s.domain) : ''}">
      <button class="wt-primary-btn" id="vc-next" ${s.domain ? '' : 'disabled'}>Next →</button>
      <button class="wt-back-btn" id="vc-prev" style="margin-top:8px">← back</button>
    `;
    const customInput = panel.querySelector('#vc-custom-domain');
    panel.querySelectorAll('[data-domain]').forEach(btn => {
      btn.addEventListener('click', () => {
        s.domain = btn.dataset.domain;
        customInput.value = '';
        panel.querySelectorAll('[data-domain]').forEach(b => b.classList.toggle('selected', b.dataset.domain === s.domain));
        panel.querySelector('#vc-next').disabled = false;
      });
    });
    customInput.addEventListener('input', () => {
      s.domain = customInput.value;
      panel.querySelectorAll('[data-domain]').forEach(b => b.classList.remove('selected'));
      panel.querySelector('#vc-next').disabled = !customInput.value;
    });
    panel.querySelector('#vc-next').addEventListener('click', () => { s.step = 2; renderWorkthrough(); });
    panel.querySelector('#vc-prev').addEventListener('click', () => { s.branch = null; renderWorkthrough(); });
  } else if (s.step === 2) {
    panel.innerHTML = `
      ${vcHeader(2, `Identity · ${s.domain}`)}
      <div class="wt-step-heading">What kind of person do you want to be in this area — and what does that actually look like day-to-day?</div>
      <textarea class="wt-textarea" id="vc-person" placeholder="I want to lead by genuinely developing people around me, not just delivering results upward.&#10;That means having 1:1s that aren't just status updates; shielding people from noise where you can; advocating for them in rooms they're not in." style="min-height:160px">${escapeHtml(s.personStatement)}</textarea>
      <button class="wt-primary-btn" id="vc-next">Next →</button>
      <button class="wt-back-btn" id="vc-prev" style="margin-top:8px">← back</button>
    `;
    const ta = panel.querySelector('#vc-person');
    ta.addEventListener('input', () => { s.personStatement = ta.value; });
    panel.querySelector('#vc-next').addEventListener('click', () => { s.step = 3; renderWorkthrough(); });
    panel.querySelector('#vc-prev').addEventListener('click', () => { s.step = 1; renderWorkthrough(); });
  } else if (s.step === 3) {
    panel.innerHTML = `
      ${vcHeader(3, `Alignment · ${s.domain}`)}
      <div class="wt-step-heading">How close is your current behavior to that?</div>
      <div class="wt-tool-helper">This gap is not a verdict — it's information. Everyone has a gap between who they are and who they want to be.</div>
      <div class="tk-closeness-row" style="margin-top:16px">
        <input type="range" class="wt-slider" id="vc-closeness" min="1" max="5" value="${s.closeness}" />
        <div class="tk-closeness-val" id="vc-closeness-val">${s.closeness}/5</div>
      </div>
      <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-bottom:16px">
        <span>far off</span><span>aligned</span>
      </div>
      <button class="wt-primary-btn" id="vc-next">Next →</button>
      <button class="wt-back-btn" id="vc-prev" style="margin-top:8px">← back</button>
    `;
    const slider = panel.querySelector('#vc-closeness');
    slider.addEventListener('input', () => { s.closeness = parseInt(slider.value); panel.querySelector('#vc-closeness-val').textContent = `${s.closeness}/5`; });
    panel.querySelector('#vc-next').addEventListener('click', () => { s.step = 4; renderWorkthrough(); });
    panel.querySelector('#vc-prev').addEventListener('click', () => { s.step = 2; renderWorkthrough(); });
  } else if (s.step === 4) {
    if (s.sizeChoice == null) {
      panel.innerHTML = `
        ${vcHeader(4, `Action · ${s.domain}`)}
        <div class="wt-step-heading">Does this feel like something a small step can move, or does it feel bigger than that?</div>
        <button class="wt-primary-btn" id="vc-small">A small step can move it</button>
        <button class="wt-primary-btn" id="vc-big" style="margin-top:8px">It feels bigger than that</button>
        <button class="wt-back-btn" id="vc-prev" style="margin-top:8px">← back</button>
      `;
      panel.querySelector('#vc-small').addEventListener('click', () => { s.sizeChoice = 'yes'; renderWorkthrough(); });
      panel.querySelector('#vc-big').addEventListener('click', () => { s.sizeChoice = 'no'; renderWorkthrough(); });
      panel.querySelector('#vc-prev').addEventListener('click', () => { s.step = 3; renderWorkthrough(); });
    } else if (s.sizeChoice === 'yes') {
      panel.innerHTML = `
        ${vcHeader(4, `Action · ${s.domain}`)}
        <div class="wt-step-heading">One small thing you can do this week that moves toward that person.</div>
        <textarea class="wt-textarea" id="vc-action" placeholder="Pick one person on your team and have a conversation this week that's purely about their growth." style="min-height:100px">${escapeHtml(s.action)}</textarea>
        <button class="wt-primary-btn" id="vc-finish">Finish</button>
        <button class="wt-back-btn" id="vc-prev" style="margin-top:8px">← back</button>
      `;
      const ta = panel.querySelector('#vc-action');
      ta.addEventListener('input', () => { s.action = ta.value; });
      panel.querySelector('#vc-finish').addEventListener('click', () => { s.step = 'done'; renderWorkthrough(); });
      panel.querySelector('#vc-prev').addEventListener('click', () => { s.sizeChoice = null; renderWorkthrough(); });
    } else {
      panel.innerHTML = `
        ${vcHeader(4, `Action · ${s.domain}`)}
        <div class="tk-note-card">Sometimes a small act is the right move. But if what came up feels bigger — like a pattern that a small step won't touch — it might be worth sitting with this longer, talking it through with someone you trust, or revisiting it as a bigger decision.</div>
        <button class="wt-primary-btn" id="vc-finish">Finish</button>
        <button class="wt-back-btn" id="vc-prev" style="margin-top:8px">← back</button>
      `;
      panel.querySelector('#vc-finish').addEventListener('click', () => { s.step = 'done'; renderWorkthrough(); });
      panel.querySelector('#vc-prev').addEventListener('click', () => { s.sizeChoice = null; renderWorkthrough(); });
    }
  } else if (s.step === 'done') {
    panel.innerHTML = `
      <div class="wt-step-heading">Done.</div>
      <div class="wt-tool-helper" style="margin-bottom:16px">${
        s.sizeChoice === 'yes'
          ? `Your step: <em>${escapeHtml(s.action || '—')}</em>`
          : `You named this as bigger than a single step — worth sitting with.`
      }</div>
      <div class="tk-save-row">
        <button class="wt-primary-btn" id="vc-save">Save</button>
        <button class="tk-discard-btn" id="vc-discard">Skip</button>
      </div>
    `;
    panel.querySelector('#vc-save').addEventListener('click', vcSaveRecord);
    panel.querySelector('#vc-discard').addEventListener('click', tkBackToLanding);
  }
}

function tkHistSaveField(store, id, field, value) {
  let arr, saveFn;
  if (store === 'rumination' || store === 'intrusion_check') { arr = loadTkThought(); saveFn = saveTkThought; }
  else if (store === 'past' || store === 'future')  { arr = loadTkSituation(); saveFn = saveTkSituation; }
  else if (store === 'values')                      { arr = loadTkValues();    saveFn = saveTkValues;    }
  else return;
  const rec = arr.find(r => r.id === id);
  if (!rec) return;
  if (field.includes('.')) {
    const [parent, child] = field.split('.');
    if (rec.data[parent] == null || typeof rec.data[parent] !== 'object') rec.data[parent] = {};
    rec.data[parent][child] = value;
  } else {
    rec.data[field] = value;
  }
  saveFn(arr);
}

function tkRenderHistField(cfg, d, id, store) {
  if (!cfg.visible) return '';
  const key = cfg.key, val = d[key];
  const label = `<div class="tk-hist-field-label">${escapeHtml(cfg.label)}</div>`;
  const attrs = `data-tkrec="${escapeHtml(id)}" data-tkstore="${escapeHtml(store)}" data-tkfield="${escapeHtml(key)}"`;

  if (cfg.type === 'textarea') {
    return `${label}<textarea class="tk-hist-inline" ${attrs} placeholder="${escapeHtml(cfg.placeholder||'')}">${escapeHtml(val||'')}</textarea>`;
  }
  if (cfg.type === 'text') {
    return `${label}<input type="text" class="tk-hist-inline" ${attrs} placeholder="${escapeHtml(cfg.placeholder||'')}" value="${escapeHtml(val||'')}">`;
  }
  if (cfg.type === 'range') {
    const v = val != null ? val : cfg.min;
    return `${label}<div class="tk-hist-range-row">
      <input type="range" class="wt-slider tk-hist-inline-range" ${attrs} min="${cfg.min}" max="${cfg.max}" value="${v}">
      <span class="tk-hist-range-val">${v}/${cfg.max}</span>
    </div>`;
  }
  if (cfg.type === 'tags') {
    const tags = Array.isArray(val) ? val : [];
    if (!tags.length) return `${label}<div style="color:var(--text-muted);font-size:12px;margin-bottom:10px">—</div>`;
    return `${label}<div class="tk-hist-chip-row">${tags.map(t => `<span class="wt-chip selected" style="pointer-events:none">${escapeHtml(t)}</span>`).join('')}</div>`;
  }
  if (cfg.type === 'chips') {
    const chips = cfg.options.map(o =>
      `<button class="wt-chip ${val===o.value?'selected':''}" ${attrs} data-tkval="${escapeHtml(o.value)}">${escapeHtml(o.label)}</button>`
    ).join('');
    return `${label}<div class="tk-hist-chip-row">${chips}</div>`;
  }
  if (cfg.type === 'domain') {
    const HIST_DOMAINS = ['Work', 'Health', 'Friendship', 'Family', 'Other'];
    const isCustom = val && !HIST_DOMAINS.includes(val);
    const chips = HIST_DOMAINS.map(dom =>
      `<button class="wt-chip ${val===dom?'selected':''}" ${attrs} data-tkval="${escapeHtml(dom)}" data-tkdomchip="">${escapeHtml(dom)}</button>`
    ).join('');
    return `${label}<div class="tk-hist-field-group">
      <div class="tk-hist-chip-row" style="margin-bottom:6px">${chips}</div>
      <input type="text" class="tk-hist-inline tk-hist-domain-custom" ${attrs} placeholder="Custom…" value="${isCustom ? escapeHtml(val) : ''}">
    </div>`;
  }
  if (cfg.type === 'protection_group') {
    const obj = (val && typeof val === 'object') ? val : {};
    return `${label}${cfg.subfields.map(sf => `
      <div class="tk-hist-field-label" style="margin-top:8px;font-size:9px">${escapeHtml(sf.label)}</div>
      <textarea class="tk-hist-inline" data-tkrec="${escapeHtml(id)}" data-tkstore="${escapeHtml(store)}" data-tkfield="protection.${escapeHtml(sf.key)}" placeholder="${escapeHtml(sf.placeholder||'')}">${escapeHtml(obj[sf.key]||'')}</textarea>
    `).join('')}`;
  }
  return '';
}

function tkHistExposureHtml(all) {
  if (!all.length) return `<div class="exp-nudge" style="border-left-color:var(--ink-faint)">No exposures recorded yet.</div>`;

  let h = '';
  expThemeList().forEach(theme => {
    const items    = all.filter(e => e.theme === theme);
    const complete = items.filter(e => e.status === 'complete').sort((a,b) => (b.date||0)-(a.date||0));
    const pending  = items.filter(e => e.status === 'pending').sort((a,b) => (b.date||0)-(a.date||0));
    const isOpen   = !tkExpClosedThemes.has(theme);

    const metaParts = [];
    if (complete.length) metaParts.push(`${complete.length} faced · all survived`);
    if (pending.length)  metaParts.push(`${pending.length} in progress`);

    h += `<div class="wt-project-card ${isOpen ? 'open' : ''}" data-theme="${escapeHtml(theme)}">
      <div class="wt-project-head">
        <div>
          <div class="wt-project-name">${escapeHtml(theme)}</div>
          <div class="wt-project-meta">${metaParts.join(' · ') || 'no exposures yet'}</div>
        </div>
        <span class="wt-project-toggle"></span>
      </div>
      <div class="wt-project-steps">`;

    if (complete.length >= 3) {
      const hard = complete.filter(e => e.survived === 'yes_hard').length;
      h += `<div class="exp-pattern">You've faced ${escapeHtml(theme)} ${complete.length} times. Each time, you predicted it would go badly. Each time, you got through it${hard ? ' — sometimes hard, but always still here' : ''}.</div>`;
    }

    pending.forEach(e => {
      h += `<div class="exp-pending-row">
        <span class="exp-badge pending">In progress</span>
        <span class="exp-pending-desc">${escapeHtml(e.situation || 'Untitled exposure')}</span>
        <button class="exp-resume-btn" data-resume="${e.id}">Resume</button>
        <button class="exp-discard-btn" data-discard="${e.id}" aria-label="Discard">×</button>
      </div>`;
    });

    complete.forEach(e => {
      if (tkExpEditId === e.id) {
        const ed = tkExpEditDraft || {};
        h += `<div class="exp-entry editing">
          <div class="exp-edit-label">Situation</div>
          <textarea class="exp-edit-field" data-ef="situation" rows="2">${escapeHtml(ed.situation||'')}</textarea>
          <div class="exp-edit-label">You predicted</div>
          <textarea class="exp-edit-field" data-ef="fear_prediction" rows="2">${escapeHtml(ed.fear_prediction||'')}</textarea>
          <div class="exp-edit-label">What happened</div>
          <textarea class="exp-edit-field" data-ef="outcome" rows="2">${escapeHtml(ed.outcome||'')}</textarea>
          <div class="exp-edit-label">Outcome</div>
          <div class="exp-edit-verdict">
            <button class="exp-verdict-btn ${ed.survived!=='yes_hard'?'selected':''}" data-verdict="yes">Survived</button>
            <button class="exp-verdict-btn ${ed.survived==='yes_hard'?'selected':''}" data-verdict="yes_hard">Survived · hard</button>
          </div>
          <div class="exp-edit-actions">
            <button class="exp-edit-cancel">Cancel</button>
            <button class="exp-edit-savebtn">Save</button>
          </div>
        </div>`;
        return;
      }
      const badge = e.survived === 'yes_hard'
        ? `<span class="exp-badge hard">Survived · hard</span>`
        : `<span class="exp-badge survived">Survived</span>`;
      h += `<div class="exp-entry">
        <div class="exp-entry-head">
          <span class="exp-entry-situation">${escapeHtml(e.situation)}</span>
          <span class="exp-entry-date">${expFmtDate(e.date)}</span>
        </div>
        <div style="margin-top:7px">${badge}</div>
        <div class="exp-vs">
          <div class="exp-vs-cell"><h5>You predicted</h5><p>${escapeHtml(e.fear_prediction)}</p></div>
          <div class="exp-vs-cell"><h5>What happened</h5><p>${escapeHtml(e.outcome)}</p></div>
        </div>
        <div class="exp-entry-actions">
          <button class="exp-mini-btn" data-expedit="${e.id}">Edit</button>
          <button class="exp-mini-btn danger" data-expdel="${e.id}">Delete</button>
        </div>
      </div>`;
    });

    h += `</div></div>`;
  });
  return h;
}

function renderTkHistory(container) {
  const thought   = loadTkThought();
  const situation = loadTkSituation();
  const values    = loadTkValues();
  const exposures = loadTkExp();

  const rumRecs       = thought.filter(r => r.branch === 'rumination').sort((a,b) => b.ts - a.ts);
  const intrusionRecs = thought.filter(r => r.branch === 'intrusion_check').sort((a,b) => b.ts - a.ts);
  const pastRecs      = situation.filter(r => r.branch === 'past').sort((a,b) => b.ts - a.ts);
  const futureRecs    = situation.filter(r => r.branch === 'future').sort((a,b) => b.ts - a.ts);
  const valuesRecs    = values.filter(r => r.branch !== 'injustice').sort((a,b) => b.ts - a.ts);
  const injusticeRecs = values.filter(r => r.branch === 'injustice').sort((a,b) => b.ts - a.ts);

  const isEmpty = !rumRecs.length && !intrusionRecs.length && !pastRecs.length && !futureRecs.length && !valuesRecs.length && !injusticeRecs.length && !exposures.length;
  if (isEmpty) {
    container.innerHTML = `
      <div class="date-line" style="text-align:center">Toolkit</div>
      <h1 class="greeting">History<em>.</em></h1>
      <div class="empty">No records yet.</div>
    `;
    return;
  }

  const sections = [
    { key: 'rumination',     label: 'Thought · Rumination',       recs: rumRecs,       fn: tkHistRumHtml      },
    { key: 'intrusion_check', label: 'Thought · Intrusion Check', recs: intrusionRecs, fn: tkHistIntrusionHtml },
    { key: 'past',       label: 'Situation · Past',           recs: pastRecs,      fn: tkHistPastHtml     },
    { key: 'future',     label: 'Situation · Future',         recs: futureRecs,    fn: tkHistFutureHtml   },
    { key: 'values',     label: 'Values · Alignment',         recs: valuesRecs,    fn: tkHistValuesHtml   },
    { key: 'injustice',  label: 'Values · Injustice',         recs: injusticeRecs, fn: tkHistInjusticeHtml},
    { key: 'exposure',   label: 'Exposure',                   recs: exposures,     fn: null               },
  ];

  const sectionsHtml = sections.filter(s => s.recs.length).map(s => {
    const open = !tkHistClosedSecs.has(s.key);
    const inner = s.key === 'exposure'
      ? tkHistExposureHtml(exposures)
      : s.recs.map(r => s.fn(r)).join('');
    return `
      <details class="tk-hist-section" data-sec="${s.key}" ${open ? 'open' : ''}>
        <summary class="tk-hist-summary">
          <span>${escapeHtml(s.label)}</span>
          <span class="tk-hist-count">${s.recs.length}</span>
        </summary>
        <div class="tk-hist-body">${inner}</div>
      </details>`;
  }).join('');

  container.innerHTML = `
    <div class="date-line" style="text-align:center">Toolkit</div>
    <h1 class="greeting">History<em>.</em></h1>
    ${sectionsHtml}
  `;

  container.querySelectorAll('.tk-hist-section').forEach(det => {
    det.addEventListener('toggle', () => {
      const k = det.dataset.sec;
      if (det.open) tkHistClosedSecs.delete(k); else tkHistClosedSecs.add(k);
    });
  });

  // Delete button
  container.querySelectorAll('[data-tkdel]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.tkdel, store = btn.dataset.tkstore;
      if (!confirm('Delete this record?')) return;
      if (store === 'rumination' || store === 'intrusion_check') saveTkThought(loadTkThought().filter(r => r.id !== id));
      else if (store === 'past' || store === 'future')  saveTkSituation(loadTkSituation().filter(r => r.id !== id));
      else if (store === 'values')                      saveTkValues(loadTkValues().filter(r => r.id !== id));
      renderTkHistory(container);
    });
  });

  // Inline blur save — text inputs and textareas
  container.querySelectorAll('.tk-hist-inline[data-tkrec]').forEach(el => {
    el.addEventListener('blur', () => {
      tkHistSaveField(el.dataset.tkstore, el.dataset.tkrec, el.dataset.tkfield, el.value);
    });
  });

  // Range slider — update display on input, save on change
  container.querySelectorAll('.tk-hist-inline-range').forEach(inp => {
    const valEl = inp.nextElementSibling;
    inp.addEventListener('input', () => { if (valEl) valEl.textContent = `${inp.value}/${inp.max}`; });
    inp.addEventListener('change', () => {
      tkHistSaveField(inp.dataset.tkstore, inp.dataset.tkrec, inp.dataset.tkfield, parseInt(inp.value));
    });
  });

  // Chip buttons — save on click, update selected state
  container.querySelectorAll('[data-tkval][data-tkrec]').forEach(btn => {
    btn.addEventListener('click', () => {
      const { tkstore: store, tkrec: id, tkfield: field, tkval: val } = btn.dataset;
      tkHistSaveField(store, id, field, val);
      btn.closest('.tk-hist-chip-row').querySelectorAll('[data-tkval]').forEach(b =>
        b.classList.toggle('selected', b.dataset.tkval === val)
      );
      if ('tkdomchip' in btn.dataset) {
        const ci = btn.closest('.tk-hist-field-group')?.querySelector('.tk-hist-domain-custom');
        if (ci) ci.value = '';
      }
    });
  });

  // Custom domain input — deselect chips on type, save on blur (handled by generic blur above)
  container.querySelectorAll('.tk-hist-domain-custom').forEach(inp => {
    inp.addEventListener('input', () => {
      inp.closest('.tk-hist-field-group')?.querySelectorAll('[data-tkdomchip]').forEach(b => b.classList.remove('selected'));
    });
  });

  // Exposure: theme collapse
  container.querySelectorAll('.wt-project-head').forEach(head => {
    head.addEventListener('click', () => {
      const card  = head.closest('.wt-project-card');
      const theme = card.dataset.theme;
      if (tkExpClosedThemes.has(theme)) tkExpClosedThemes.delete(theme); else tkExpClosedThemes.add(theme);
      card.classList.toggle('open');
    });
  });

  // Exposure: resume pending
  container.querySelectorAll('[data-resume]').forEach(btn => {
    btn.addEventListener('click', ev => {
      ev.stopPropagation();
      const rec = loadTkExp().find(x => x.id === btn.dataset.resume);
      if (!rec) return;
      wtState.step = 5;
      wtState.activeActionTool = 'exposure_rewire';
      wtState.draft._exp = {
        step: 'ready', exposureId: rec.id, theme: rec.theme,
        situation: rec.situation, fear_prediction: rec.fear_prediction,
        values_link: rec.values_link, outcome: rec.outcome || '', survived: null,
      };
      tkHistTab = 'main';
      renderWorkthrough();
    });
  });

  // Exposure: discard pending
  container.querySelectorAll('[data-discard]').forEach(btn => {
    btn.addEventListener('click', ev => {
      ev.stopPropagation();
      if (!confirm('Discard this in-progress exposure? This cannot be undone.')) return;
      saveTkExp(loadTkExp().filter(x => x.id !== btn.dataset.discard));
      renderTkHistory(container);
    });
  });

  // Exposure: edit complete entry
  container.querySelectorAll('[data-expedit]').forEach(btn => {
    btn.addEventListener('click', ev => {
      ev.stopPropagation();
      const rec = loadTkExp().find(x => x.id === btn.dataset.expedit);
      if (!rec) return;
      tkExpEditId    = rec.id;
      tkExpEditDraft = { situation: rec.situation||'', fear_prediction: rec.fear_prediction||'', outcome: rec.outcome||'', survived: rec.survived||'yes' };
      renderTkHistory(container);
    });
  });

  // Exposure: delete complete entry
  container.querySelectorAll('[data-expdel]').forEach(btn => {
    btn.addEventListener('click', ev => {
      ev.stopPropagation();
      if (!confirm('Delete this record? This cannot be undone.')) return;
      saveTkExp(loadTkExp().filter(x => x.id !== btn.dataset.expdel));
      if (tkExpEditId === btn.dataset.expdel) { tkExpEditId = null; tkExpEditDraft = null; }
      renderTkHistory(container);
    });
  });

  // Exposure edit form fields
  container.querySelectorAll('.exp-edit-field').forEach(f => {
    f.addEventListener('input', () => { if (tkExpEditDraft) tkExpEditDraft[f.dataset.ef] = f.value; });
  });
  container.querySelectorAll('.exp-verdict-btn').forEach(b => {
    b.addEventListener('click', () => {
      if (tkExpEditDraft) tkExpEditDraft.survived = b.dataset.verdict;
      b.closest('.exp-edit-verdict').querySelectorAll('.exp-verdict-btn').forEach(x => x.classList.toggle('selected', x === b));
    });
  });
  container.querySelectorAll('.exp-edit-cancel').forEach(b => {
    b.addEventListener('click', () => { tkExpEditId = null; tkExpEditDraft = null; renderTkHistory(container); });
  });
  container.querySelectorAll('.exp-edit-savebtn').forEach(b => {
    b.addEventListener('click', () => {
      const list = loadTkExp(); const rec = list.find(x => x.id === tkExpEditId);
      if (rec && tkExpEditDraft) {
        rec.situation       = (tkExpEditDraft.situation||'').trim();
        rec.fear_prediction = (tkExpEditDraft.fear_prediction||'').trim();
        rec.outcome         = (tkExpEditDraft.outcome||'').trim();
        rec.survived        = tkExpEditDraft.survived;
        saveTkExp(list);
      }
      tkExpEditId = null; tkExpEditDraft = null;
      showSaved('Record updated'); renderTkHistory(container);
    });
  });
}
