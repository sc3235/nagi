// ---------- Sleep ----------
function currentSleepRangeIdx() {
  const h = new Date().getHours();
  if (h >= 6  && h < 8)  return 0;
  if (h >= 8  && h < 18) return 1;
  if (h >= 18 && h < 22) return 2;
  return 3;
}
function sleepCheckState(rec, item) {
  if (rec && rec.checks && item.id in rec.checks) return rec.checks[item.id];
  return false;
}
function sleepMetCount(rec) {
  let n = 0;
  SLEEP_RANGES.forEach(r => r.items.forEach(it => { if (sleepCheckState(rec, it)) n++; }));
  return n;
}
function sleepStreak() {
  return streakFor(sleepStore.history, () => true);
}
function sleepRangeDateStr(rangeIdx, dayOffset) {
  dayOffset = dayOffset || 0;
  const now = new Date();
  const fmt = d => d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  if (rangeIdx !== 3) {
    const d = new Date(now); d.setDate(d.getDate() + dayOffset);
    return fmt(d);
  }
  const fmtSpan = (d1, d2) => d1.getMonth() === d2.getMonth()
    ? `${fmt(d1)}–${d2.getDate()}`
    : `${fmt(d1)} – ${fmt(d2)}`;
  if (dayOffset === -1) {
    const d1 = new Date(now); d1.setDate(d1.getDate() - 2);
    const d2 = new Date(now); d2.setDate(d2.getDate() - 1);
    return fmtSpan(d1, d2);
  }
  if (now.getHours() < 6) {
    const yesterday = new Date(now); yesterday.setDate(yesterday.getDate() - 1);
    return fmtSpan(yesterday, now);
  }
  const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate() + 1);
  return fmtSpan(now, tomorrow);
}
function toggleSleepItem(key, itemId) {
  let item;
  SLEEP_RANGES.forEach(r => r.items.forEach(it => { if (it.id === itemId) item = it; }));
  if (!item) return;
  let rec = sleepStore.history[key];
  if (!rec) { rec = { checks: {}, updated: 0 }; sleepStore.history[key] = rec; }
  const cur = (item.id in rec.checks) ? rec.checks[item.id] : false;
  rec.checks[item.id] = !cur;
  rec.updated = Date.now();
  persistSleep();
  showSaved();
}

function sleepCheckIcon() {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="var(--paper)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
}

function renderSleep() {
  const container = document.getElementById('sleep-content');
  container.innerHTML = `<div id="sleep-panel"></div>`;
  if (sleepState.tab === 'today') renderSleepChecklist();
  else renderSleepHistory();
}

function renderSleepChecklist() {
  const panel     = document.getElementById('sleep-panel');
  const nowIdx    = currentSleepRangeIdx();
  const idx       = sleepState.rangeIdx;
  const dayOffset = sleepState.dayOffset || 0;
  const range     = SLEEP_RANGES[idx];

  const yd = new Date(); yd.setDate(yd.getDate() - 1);
  const key = dayOffset === 0 ? todayKey() : dateKey(yd);
  const rec = sleepStore.history[key];

  const prevDisabled = dayOffset === -1 && idx === 0;
  const nextDisabled = dayOffset === 0  && idx === 3;

  const dots = SLEEP_RANGES.map((r, i) =>
    `<div class="sleep-dot ${i===idx?'active':''} ${i===nowIdx&&dayOffset===0?'now':''}"></div>`
  ).join('');

  const items = range.items.map(it => {
    const on = sleepCheckState(rec, it);
    return `
      <button class="sleep-check-row ${on?'checked':''}" data-item="${it.id}">
        <span class="sleep-checkbox">${sleepCheckIcon()}</span>
        <span class="sleep-check-label">${escapeHtml(it.text)}${it.nice?'<span class="sleep-nice-tag">nice to have</span>':''}</span>
      </button>`;
  }).join('');

  const tips = range.tips ? `
    <div class="sleep-tips">
      <div class="sleep-tips-label">Tips</div>
      ${range.tips.map(t => `<div class="sleep-tip">${escapeHtml(t)}</div>`).join('')}
    </div>` : '';

  const metInRange = range.items.filter(it => sleepCheckState(rec, it)).length;

  const nowTag       = idx===nowIdx && dayOffset===0 ? ' · <span class="sleep-now-tag">now</span>' : '';
  const yesterdayTag = dayOffset === -1 ? ' · <span class="sleep-yday-tag">yesterday</span>' : '';

  panel.innerHTML = `
    <h1 class="greeting">How are you sleeping<em>?</em></h1>
    <div class="sleep-range-head">
      <button class="sleep-range-arrow" id="sleep-prev" aria-label="Previous range"${prevDisabled?' disabled':''}>‹</button>
      <div class="sleep-range-title">
        <div class="sleep-range-name">${range.name}</div>
        <div class="sleep-range-time">${sleepRangeDateStr(idx, dayOffset)} · ${range.time}${nowTag}${yesterdayTag}</div>
      </div>
      <button class="sleep-range-arrow" id="sleep-next" aria-label="Next range"${nextDisabled?' disabled':''}>›</button>
    </div>
    <div class="sleep-dots">${dots}</div>
    ${items}
    ${tips}
    <div class="sleep-met-summary">${metInRange}/${range.items.length} accomplished</div>
  `;

  panel.querySelector('#sleep-prev').addEventListener('click', () => {
    if (idx > 0) {
      sleepState.rangeIdx--;
    } else if (dayOffset === 0) {
      sleepState.dayOffset = -1;
      sleepState.rangeIdx  = SLEEP_RANGES.length - 1;
    }
    renderSleepChecklist();
  });
  panel.querySelector('#sleep-next').addEventListener('click', () => {
    if (idx < SLEEP_RANGES.length - 1) {
      sleepState.rangeIdx++;
    } else if (dayOffset === -1) {
      sleepState.dayOffset = 0;
      sleepState.rangeIdx  = 0;
    }
    renderSleepChecklist();
  });
  panel.querySelectorAll('.sleep-check-row').forEach(row => {
    row.addEventListener('click', () => {
      toggleSleepItem(key, row.dataset.item);
      renderSleepChecklist();
    });
  });
}

function renderSleepHistory() {
  const panel = document.getElementById('sleep-panel');
  const keys  = Object.keys(sleepStore.history).sort().reverse();
  if (!keys.length) {
    panel.innerHTML = `
      <div class="date-line date-line-center">Sleep</div>
      <h1 class="greeting">History<em>.</em></h1>
      <div class="empty">No entries yet — your first record will appear here.</div>`;
    return;
  }
  panel.innerHTML = `
    <div class="date-line" style="text-align:center">Sleep</div>
    <h1 class="greeting" style="text-align:center">History<em>.</em></h1>
    ${keys.map(sleepHistoryEntryHtml).join('')}`;

  panel.querySelectorAll('[data-sedit]').forEach(b => b.addEventListener('click', () => {
    sleepState.editId = b.dataset.sedit; renderSleepHistory();
  }));
  panel.querySelectorAll('[data-sdone]').forEach(b => b.addEventListener('click', () => {
    sleepState.editId = null; renderSleepHistory();
  }));
  panel.querySelectorAll('[data-sdel]').forEach(b => b.addEventListener('click', () => {
    const k = b.dataset.sdel;
    if (!confirm(`Delete sleep log for ${fmtDate(k)}?`)) return;
    delete sleepStore.history[k];
    persistSleep(); showSaved('deleted'); renderSleepHistory();
  }));
  panel.querySelectorAll('[data-edititem]').forEach(row => row.addEventListener('click', () => {
    toggleSleepItem(row.closest('.day-entry').dataset.skey, row.dataset.edititem);
    renderSleepHistory();
  }));
}

function sleepHistoryEntryHtml(key) {
  const rec = sleepStore.history[key];
  const met = sleepMetCount(rec);

  if (sleepState.editId === key) {
    const groups = SLEEP_RANGES.map(r => `
      <div class="sleep-edit-group-label">${r.name} · ${r.time}</div>
      ${r.items.map(it => {
        const on = sleepCheckState(rec, it);
        return `
          <button class="sleep-check-row ${on?'checked':''}" data-edititem="${it.id}">
            <span class="sleep-checkbox">${sleepCheckIcon()}</span>
            <span class="sleep-check-label">${escapeHtml(it.text)}${it.nice?'<span class="sleep-nice-tag">nice to have</span>':''}</span>
          </button>`;
      }).join('')}
    `).join('');
    return `
      <div class="day-entry editing" data-skey="${key}">
        <div class="day-head">
          <div class="day-head-left">
            <div class="day-date">${fmtDate(key)}</div>
            <div class="day-meta">${met}/${SLEEP_ITEM_COUNT} accomplished</div>
          </div>
          <div class="entry-actions">
            <button class="entry-action-btn primary" data-sdone="${key}">done</button>
          </div>
        </div>
        ${groups}
      </div>`;
  }

  const dots = SLEEP_RANGES.map((r, ri) =>
    `<div class="sdot-group">${r.items.map(it =>
      `<div class="sdot ${sleepCheckState(rec, it)?'met':''}"></div>`

        </svg>

      : `<span>Inhale <strong>4</strong>s</span><span>Hold <strong>4</strong>s</span><span>Exhale <strong>4</strong>s</span><span>Hold <strong>4</strong>s</span>`;
    const goalWidget = breathState.goalType === 'cycles'
      ? `<div class="calm-stepper-row">
           <button class="calm-step-btn" data-step="-1">−</button>
           <span class="calm-step-val">${breathState.goalValue} cycle${breathState.goalValue!==1?'s':''}</span>
           <button class="calm-step-btn" data-step="1">+</button>
         </div>`
      : `<div class="calm-stepper-row">
           <button class="calm-step-btn" data-step="-1">−</button>
           <span class="calm-step-val">${breathState.goalValue} min</span>

      <div class="calm-picker-label">Pattern</div>
      <div class="calm-picker-row">
        ${Object.entries(BREATH_MODES).map(([k,v])=>`<button class="calm-pick-btn ${breathState.mode===k?'active':''}" data-mode="${k}">${v.name}</button>`).join('')}
      </div>
      <div class="breath-phases-preview">${pv}</div>
      <div class="calm-picker-label">Goal</div>
      <div class="calm-picker-row">
        <button class="calm-pick-btn ${breathState.goalType==='cycles'?'active':''}" data-goal="cycles">Cycles</button>
        <button class="calm-pick-btn ${breathState.goalType==='timer'?'active':''}" data-goal="timer">Timer</button>
      </div>

    `;
    panel.querySelectorAll('[data-mode]').forEach(b => b.addEventListener('click', () => { breathState.mode = b.dataset.mode; renderBreathing(); }));
    panel.querySelectorAll('[data-goal]').forEach(b => b.addEventListener('click', () => { breathState.goalType = b.dataset.goal; breathState.goalValue = 3; renderBreathing(); }));
    panel.querySelectorAll('.calm-step-btn').forEach(b => b.addEventListener('click', () => { breathState.goalValue = Math.max(1,Math.min(30,breathState.goalValue+parseInt(b.dataset.step))); renderBreathing(); }));
    panel.querySelector('#breath-start').addEventListener('click', startBreathing);
  }
}

function breathGoalStr() {
  if (breathState.goalType === 'cycles') return `cycle ${breathState.cyclesDone+1} / ${breathState.goalValue}`;
  const ms = Math.max(0, breathState.timerEndAt - Date.now());
  const s = Math.floor(ms/1000); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

function beginBreathPhase() {
  const phase = BREATH_MODES[breathState.mode].phases[breathState.phaseIdx];
  const el = document.getElementById('breath-circle');
  if (!el) return;
  el.style.animation = 'none';
  el.getBoundingClientRect();
  if      (phase.key === 'inhale') el.style.animation = `breathGrow ${phase.secs}s ease-in forwards`;
  else if (phase.key === 'exhale') el.style.animation = `breathShrink ${phase.secs}s ease-out forwards`;
  else if (phase.key === 'hold1')  { el.style.animation = 'none'; el.style.transform = 'scale(1.28)'; }
  else                             { el.style.animation = 'none'; el.style.transform = 'scale(0.72)'; }
}

function startBreathing() {
  const m = BREATH_MODES[breathState.mode];
  breathState.running = true;
  breathState.phaseIdx = 0;
  breathState.phaseRemaining = m.phases[0].secs;
  breathState.cyclesDone = 0;
  if (breathState.goalType === 'timer') breathState.timerEndAt = Date.now() + breathState.goalValue*60*1000;
  renderBreathing();
  breathState.interval = setInterval(breathTick, 1000);
}

function stopBreathing(rerender) {
  clearInterval(breathState.interval);
  breathState.interval = null;
  breathState.running = false;
  breathState.timerEndAt = null;
  if (rerender !== false) renderBreathing();
}

function breathTick() {
  breathState.phaseRemaining--;
  if (breathState.phaseRemaining <= 0) {
    const m = BREATH_MODES[breathState.mode];
    const nextIdx = (breathState.phaseIdx + 1) % m.phases.length;
    if (nextIdx === 0) {
      breathState.cyclesDone++;
      if (breathState.goalType === 'cycles' && breathState.cyclesDone >= breathState.goalValue) { stopBreathing(true); return; }
    }
    if (breathState.goalType === 'timer' && Date.now() >= breathState.timerEndAt) { stopBreathing(true); return; }
    breathState.phaseIdx = nextIdx;
    breathState.phaseRemaining = m.phases[nextIdx].secs;
    renderBreathing();
    return;
  }
  const phase = BREATH_MODES[breathState.mode].phases[breathState.phaseIdx];
  const progress = (phase.secs - breathState.phaseRemaining) / phase.secs;
  const countEl = document.getElementById('breath-count');
  const ringEl  = document.getElementById('breath-ring-fill');
  const goalEl  = document.getElementById('breath-goal');
  if (countEl) countEl.textContent = breathState.phaseRemaining;
  if (ringEl)  ringEl.style.strokeDashoffset = `${(BREATH_RING_CIRC * (1 - progress)).toFixed(1)}px`;
  if (goalEl)  goalEl.textContent = `${BREATH_MODES[breathState.mode].name} · ${breathGoalStr()}`;
}

      groundingState.mode = groundingState.subMode;
      groundingState.senseStep = 0; groundingState.senseCount = 0;
      if (groundingState.mode === 'imagery') imageryState.idx = 0;
      renderGrounding();
    });
    const histLink = panel.querySelector('#grd-hist-link');
    if (histLink) {
      histLink.addEventListener('click', () => {
        activeCalmTool = null;
        calmHistTab = 'history';
        renderCalm();
      });
    }
    return;
  }

  if (groundingState.mode === 'fivesenses') {
    const sense = SENSES[groundingState.senseStep];
    const remaining = sense.count - groundingState.senseCount;
    panel.innerHTML = `
      <div class="imagery-dots" style="margin-bottom:18px">
        ${SENSES.map((_,i) => `<div class="imagery-dot ${i===groundingState.senseStep?'current':i<groundingState.senseStep?'done':''}"></div>`).join('')}
      </div>
      <div class="grd-sense-prompt">Notice <strong>${remaining}</strong> thing${remaining!==1?'s':''} you can <em class="clr-${sense.color}">${sense.verb}</em></div>
      <button class="grd-tap-btn" data-color="${sense.color}" id="grd-tap">
        <div class="grd-tap-count">${remaining}</div>
        <div class="grd-tap-label">tap for each one</div>
      </button>
      <div class="grd-dots">
        ${Array.from({length: sense.count}, (_,i) => `<div class="grd-dot ${i < groundingState.senseCount ? 'filled' : ''}" data-color="${sense.color}"></div>`).join('')}
      </div>
      <button class="breath-stop-btn" id="grd-stop">Stop</button>
    `;
    document.getElementById('grd-tap').addEventListener('click', () => {
      groundingState.senseCount++;
      if (groundingState.senseCount >= sense.count) {
        if (groundingState.senseStep >= SENSES.length - 1) {
          groundingState.mode = 'idle'; renderGrounding(); showSaved('5-4-3-2-1 complete'); return;
        }
        groundingState.senseStep++; groundingState.senseCount = 0;
      }
      renderGrounding();
    });
    document.getElementById('grd-stop').addEventListener('click', () => { groundingState.mode = 'idle'; renderGrounding(); });
    return;
  }

  if (groundingState.mode === 'narration') {
    const savedText = (calmStore.narrations || {})[todayKey()] || '';
    if (!groundingState.narration && savedText) groundingState.narration = savedText;
    panel.innerHTML = `
      <div class="calm-heading">Narration</div>
      <p class="calm-sub">Describe your current moment in third person, as if you are a narrator in a novel. Observe every detail without judgment.</p>
      <textarea class="grd-narration" id="grd-narration" placeholder="She sat by the window, noticing the weight of the afternoon light across her hands…">${escapeHtml(groundingState.narration)}</textarea>
      <div class="tk-save-row">
        <button class="wt-primary-btn" id="grd-narr-save" style="background:var(--slate);margin-bottom:0">Save</button>
        <button class="tk-discard-btn" id="grd-narr-done">Skip</button>
      </div>
    `;
    document.getElementById('grd-narration').addEventListener('input', e => {
      groundingState.narration = e.target.value;
    });
    document.getElementById('grd-narr-save').addEventListener('click', () => {
      calmStore.narrations[todayKey()] = groundingState.narration;
      persistCalm();
      showSaved('Narration saved');
      groundingState.mode = 'idle';
      renderGrounding();
    });
    document.getElementById('grd-narr-done').addEventListener('click', () => {
      groundingState.mode = 'idle';
      renderGrounding();
    });
    return;
  }

  if (groundingState.mode === 'imagery') {
    const isLast = imageryState.idx >= BEACH_SCRIPT.length - 1;
    panel.innerHTML = `
      <div class="imagery-progress">${imageryState.idx+1} / ${BEACH_SCRIPT.length}</div>
      <div class="imagery-dots">
        ${BEACH_SCRIPT.map((_,i) => `<div class="imagery-dot ${i===imageryState.idx?'current':i<imageryState.idx?'done':''}"></div>`).join('')}
      </div>
      <div class="imagery-text">${escapeHtml(BEACH_SCRIPT[imageryState.idx])}</div>
      <div class="imagery-actions">
        ${imageryState.idx > 0 ? `<button class="imagery-nav-btn" id="imagery-back">← back</button>` : ''}
        <button class="imagery-nav-btn ${isLast?'primary':''}" id="imagery-next">${isLast?'Done':'Next →'}</button>
      </div>
    `;
    panel.querySelector('#imagery-next').addEventListener('click', () => {
      if (isLast) { imageryState.idx = -1; groundingState.mode = 'idle'; }
      else        { imageryState.idx++; }
      renderGrounding();
    });
    const backBtn = panel.querySelector('#imagery-back');
    if (backBtn) backBtn.addEventListener('click', () => { imageryState.idx--; renderGrounding(); });
    return;
  }
}

// --- PMR ---
function renderPmr() {
  const panel = document.getElementById('calm-panel');
  const shown = getPmrShown();

  if (pmrState.mode === 'settings') {
    const order = getPmrOrder();
    panel.innerHTML = `
      <div class="pmr-settings-head">
        <div class="calm-heading">Muscle Groups</div>
        <button class="calm-pick-btn active" id="pmr-settings-done">Done</button>
      </div>
      <p class="calm-sub">Reorder with ↑↓ and toggle to include or skip in your session.</p>
      ${order.map((name, i) => {
        const isOn = shown[name] !== false;
        return `
          <div class="pmr-group-toggle ${isOn?'active':''}" data-group="${escapeHtml(name)}">
            <div class="pmr-reorder-btns">
              <button class="pmr-reorder-btn" data-dir="-1" data-group="${escapeHtml(name)}"${i===0?' disabled':''}>↑</button>
              <button class="pmr-reorder-btn" data-dir="1"  data-group="${escapeHtml(name)}"${i===order.length-1?' disabled':''}>↓</button>
            </div>
            <div class="pmr-group-toggle-name">${escapeHtml(name)}</div>
            <div class="switch ${isOn?'on':''}"></div>
          </div>
        `;
      }).join('')}
    `;
    panel.querySelectorAll('.pmr-reorder-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        if (btn.disabled) return;
        const ord = getPmrOrder();
        const idx = ord.indexOf(btn.dataset.group);
        const newIdx = idx + parseInt(btn.dataset.dir);
        if (newIdx < 0 || newIdx >= ord.length) return;
        [ord[idx], ord[newIdx]] = [ord[newIdx], ord[idx]];
        metaStore.pmrOrder = ord; persistMeta(); renderPmr();
      });
    });
    panel.querySelectorAll('.pmr-group-toggle').forEach(row => {
      row.addEventListener('click', () => {
        const n = row.dataset.group;
        shown[n] = (shown[n] === false) ? true : false;
        metaStore.pmrShown = shown; persistMeta(); renderPmr();
      });
    });
    panel.querySelector('#pmr-settings-done').addEventListener('click', () => { pmrState.mode = 'idle'; renderPmr(); });
    return;
  }

  if (pmrState.mode === 'session') {
    const shownGroups = getShownGroups();
    const group = shownGroups[pmrState.stepIdx];
    if (!group) { pmrState.mode = 'idle'; renderPmr(); return; }
    const isRelease = pmrState.phase === 'release';
    const total = isRelease ? (metaStore.pmrRelaxSec || 10) : (metaStore.pmrTenseSec || 3);
    const progress = (total - pmrState.phaseRemaining) / total;
    panel.innerHTML = `
      <div class="pmr-step-info">${pmrState.stepIdx+1} / ${shownGroups.length} · ${escapeHtml(group.name)}</div>
      <div class="breath-circle-wrap">
        <svg class="breath-ring" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <circle class="breath-ring-track" cx="100" cy="100" r="84"/>
          <circle class="breath-ring-fill ${isRelease?'release':'pmr-tense'}" cx="100" cy="100" r="84" id="pmr-ring-fill"
            style="stroke-dashoffset:${(BREATH_RING_CIRC * (1 - progress)).toFixed(1)}px"/>
        </svg>
        <div class="breath-circle ${isRelease?'release-mode':''}">
          <div class="breath-phase-label">${isRelease?'RELEASE':'TENSE'}</div>
          <div class="breath-count" id="pmr-count">${pmrState.phaseRemaining}</div>
        </div>
      </div>
      <div class="pmr-instruction">${escapeHtml(isRelease ? group.release : group.tense)}</div>
      <button class="breath-stop-btn" id="pmr-stop">Stop session</button>
    `;
    document.getElementById('pmr-stop').addEventListener('click', () => {
      clearInterval(pmrState.interval); pmrState.interval = null; pmrState.mode = 'idle'; renderPmr();
    });
    return;
  }

  // Idle
  const shownGroups = getShownGroups();
  const tenseSec = metaStore.pmrTenseSec || 3;
  const relaxSec = metaStore.pmrRelaxSec || 10;
  panel.innerHTML = `
    <div class="calm-heading">Progressive Muscle Relaxation</div>
    <p class="calm-sub">Tense each muscle group, then release and observe the contrast. Adjust durations below.</p>
    <div class="pmr-dur-row">
      <div class="pmr-dur-item">
        <div class="pmr-dur-label">Tense <span id="pmr-tense-val">${tenseSec}s</span></div>
        <input class="pmr-dur-slider" id="pmr-tense-slider" type="range" min="3" max="5" step="1" value="${tenseSec}">
      </div>
      <div class="pmr-dur-item">
        <div class="pmr-dur-label">Relax <span id="pmr-relax-val">${relaxSec}s</span></div>
        <input class="pmr-dur-slider" id="pmr-relax-slider" type="range" min="10" max="20" step="5" value="${relaxSec}">
      </div>
    </div>
    <div class="pmr-group-list">
      ${shownGroups.map((g,i) => `
        <div class="pmr-preview-item">
          <span class="pmr-preview-num">${i+1}</span>
          <span class="pmr-preview-name">${escapeHtml(g.name)}</span>
        </div>
      `).join('')}
    </div>
    <div class="calm-bottom-row">
      <button class="calm-pick-btn" id="pmr-customize">Customize</button>
      <button class="calm-start-btn clr-low-btn" id="pmr-start">Begin (${shownGroups.length} groups)</button>
    </div>
  `;
  panel.querySelector('#pmr-tense-slider').addEventListener('input', e => {
    const v = parseInt(e.target.value);
    metaStore.pmrTenseSec = v; persistMeta();
    panel.querySelector('#pmr-tense-val').textContent = v + 's';
  });
  panel.querySelector('#pmr-relax-slider').addEventListener('input', e => {
    const v = parseInt(e.target.value);
    metaStore.pmrRelaxSec = v; persistMeta();
    panel.querySelector('#pmr-relax-val').textContent = v + 's';
  });
  panel.querySelector('#pmr-customize').addEventListener('click', () => { pmrState.mode = 'settings'; renderPmr(); });
  panel.querySelector('#pmr-start').addEventListener('click', () => {
    if (!shownGroups.length) return;
    pmrState.mode = 'session'; pmrState.stepIdx = 0;
    pmrState.phase = 'tense'; pmrState.phaseRemaining = metaStore.pmrTenseSec || 3;
    renderPmr();
    pmrState.interval = setInterval(pmrTick, 1000);
  });
}

function pmrTick() {
  const tenseSec = metaStore.pmrTenseSec || 3;
  const relaxSec = metaStore.pmrRelaxSec || 10;
  pmrState.phaseRemaining--;
  if (pmrState.phaseRemaining <= 0) {
    if (pmrState.phase === 'tense') {
      pmrState.phase = 'release'; pmrState.phaseRemaining = relaxSec;
    } else {
      const shownGroups = getShownGroups();
      pmrState.stepIdx++;
      if (pmrState.stepIdx >= shownGroups.length) {
        clearInterval(pmrState.interval); pmrState.interval = null;
        pmrState.mode = 'idle'; renderPmr(); showSaved('PMR complete'); return;
      }
      pmrState.phase = 'tense'; pmrState.phaseRemaining = tenseSec;
    }
    renderPmr(); return;
  }
  const total = pmrState.phase === 'tense' ? tenseSec : relaxSec;
  const progress = (total - pmrState.phaseRemaining) / total;
  const countEl = document.getElementById('pmr-count');
  const ringEl  = document.getElementById('pmr-ring-fill');
  if (countEl) countEl.textContent = pmrState.phaseRemaining;
  if (ringEl)  ringEl.style.strokeDashoffset = `${(BREATH_RING_CIRC * (1 - progress)).toFixed(1)}px`;
}

loadHama();
loadCalm();

// ── Logo: 凪  (favicon + Media Session artwork) ──────────────────────────
let _artworkDataUrl = null;

function getArtworkDataUrl() {
  if (_artworkDataUrl !== null) return _artworkDataUrl;
  try {
    const S = 512, cx = 256, cy = 256;
    const canvas = document.createElement('canvas');
    canvas.width = S; canvas.height = S;
    const ctx = canvas.getContext('2d');

    const bg = ctx.createLinearGradient(0, 0, 0, S);
    bg.addColorStop(0, '#F6F0E6'); bg.addColorStop(1, '#E6DCC8');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, S, S);

    const glow = ctx.createRadialGradient(cx, cy - 24, 0, cx, cy - 24, 360);
    glow.addColorStop(0, 'rgba(196,154,90,0.17)');
    glow.addColorStop(1, 'rgba(196,154,90,0)');
    ctx.fillStyle = glow; ctx.fillRect(0, 0, S, S);

    [105, 150, 195, 238].forEach((r, i) => {
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(140,107,62,${0.22 - i * 0.04})`;
      ctx.lineWidth = i === 0 ? 0.9 : 0.5; ctx.stroke();
    });

    for (let a = 0; a < 360; a += 30) {
      const rad = a * Math.PI / 180, len = a % 90 === 0 ? 13 : 6;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(rad) * 105, cy + Math.sin(rad) * 105);
      ctx.lineTo(cx + Math.cos(rad) * (105 - len), cy + Math.sin(rad) * (105 - len));
      ctx.strokeStyle = `rgba(140,107,62,${a % 90 === 0 ? 0.55 : 0.26})`;
      ctx.lineWidth = a % 90 === 0 ? 0.9 : 0.5; ctx.stroke();
    }

    [[0, S, S, 0], [0, 0, S, S]].forEach(([x1, y1, x2, y2]) => {
      const lg = ctx.createLinearGradient(x1, y1, x2, y2);
      lg.addColorStop(0, 'rgba(140,107,62,0)');
      lg.addColorStop(0.5, 'rgba(140,107,62,0.10)');
      lg.addColorStop(1, 'rgba(140,107,62,0)');
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
      ctx.strokeStyle = lg; ctx.lineWidth = 0.6; ctx.stroke();
    });

    ctx.save();
    ctx.globalAlpha = 0.05;
    ctx.font = '500 430px "Shippori Mincho", serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#6B4F2A';
    ctx.fillText('凪', cx, cy + 4);
    ctx.restore();

    const font = '500 268px "Shippori Mincho", serif';

    ctx.save();
    ctx.shadowColor = 'rgba(60,44,30,0.30)'; ctx.shadowBlur = 22;
    const cg = ctx.createLinearGradient(cx, cy - 160, cx, cy + 120);
    cg.addColorStop(0, '#5E4A36'); cg.addColorStop(0.6, '#3A2C1E'); cg.addColorStop(1, '#241A10');
    ctx.font = font; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = cg; ctx.fillText('凪', cx, cy);
    ctx.restore();

    ctx.save();
    ctx.font = font; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.strokeStyle = 'rgba(182,142,72,0.72)';
    ctx.lineWidth = 0.8; ctx.lineJoin = 'round';
    ctx.strokeText('凪', cx, cy);
    ctx.restore();

    [[cx, 38], [474, cy], [cx, 474], [38, cy]].forEach(([x, y]) => {
      ctx.beginPath(); ctx.arc(x, y, 2.6, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(140,107,62,0.55)'; ctx.fill();
    });

    _artworkDataUrl = canvas.toDataURL('image/png');
  } catch (e) {
    _artworkDataUrl = '';
  }
  return _artworkDataUrl;
}

document.fonts.load('500 268px "Shippori Mincho"', '凪')
  .then(() => { if (_artworkDataUrl === null) getArtworkDataUrl(); })
  .catch(() => {});

// Prevent iOS Safari from zooming in on input/textarea focus
(function() {
  const vp = document.querySelector('meta[name="viewport"]');
  const base = vp.content;
  const noZoom = base + ', maximum-scale=1';
  document.addEventListener('focusin',  e => { if (e.target.matches('input, textarea')) vp.content = noZoom; });
  document.addEventListener('focusout', e => { if (e.target.matches('input, textarea')) vp.content = base; });
})();
</script>
