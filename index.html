<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="凪" />
<meta name="theme-color" content="#E6ECF1" />
<title>凪</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500&family=Shippori+Mincho:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" id="favicon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<style>
  :root {
    --bg: #E6ECF1;
    --bg-elev: #F0F4F9;
    --bg-card: #D6E0EA;
    --ink: #2A3645;
    --ink-dim: #5C6E81;
    --ink-faint: #92A3B4;
    --accent: #5298BC;
    --accent-deep: #3A5067;
    --line: #C3CFD9;
    --good: #4D8E65;
    --mid: #A87C2E;
    --low: #B86030;
    --bad: #A04848;
    --radius: 14px;
    --serif: 'Fraunces', Georgia, serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --sky:    #5298BC;
    --slate:  #3D5870;
    --sage:   #5A7E70;
    --amber:  #8d528a;
    --paper:  #FFF9F2;
    --breath-ring-circ: 528px;
    --rose: #C58462;
    --danger: var(--bad);
    --matcha: #7E9A5A; /* only for tea coloring */
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--serif);
    font-feature-settings: "ss01", "ss02";
    overscroll-behavior-y: contain;
    min-height: 100vh;
    min-height: 100dvh;
  }
  body {
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    background-image:
      radial-gradient(ellipse at 10% 0%,   rgba(82,  152, 188, 0.08), transparent 42%),
      radial-gradient(ellipse at 92% 15%,  rgba(61,   88, 112, 0.06), transparent 38%),
      radial-gradient(ellipse at 80% 100%, rgba(82,  120, 160, 0.05), transparent 40%);
    background-attachment: fixed;
  }
  button, input, textarea { font-family: inherit; color: inherit; }
  button { background: none; border: none; padding: 0; cursor: pointer; }

  header.app-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 22px 14px;
    position: sticky; top: 0;
    background: linear-gradient(to bottom, var(--bg) 70%, transparent);
    z-index: 10;
    backdrop-filter: blur(8px);
  }
  .brand {
    font-weight: 600;
    font-size: 22px;
    letter-spacing: -0.02em;
    font-variation-settings: "opsz" 144;
  }
  .brand em {
    font-style: italic;
    font-weight: 300;
    color: var(--accent);
  }
  .nav-tabs {
    display: flex;
    gap: 4px;
    padding: 4px;
    background: var(--bg-elev);
    border-radius: 999px;
    border: 1px solid var(--line);
  }
  .nav-tabs button {
    padding: 6px 14px;
    font-size: 13px;
    font-family: var(--mono);
    color: var(--ink-dim);
    border-radius: 999px;
    transition: all 0.2s;
  }
  .nav-tabs button.active {
    background: var(--accent);
    color: var(--paper);
    font-weight: 500;
  }
  #nav-tabs button.active   { background: var(--slate); }
  #sleep-tabs button.active  { background: var(--sky); }
  #calm-tabs button.active    { background: var(--sage); }
  #toolkit-tabs button.active { background: var(--amber); }
  .tk-hist-section { margin-bottom: 20px; }
  .tk-hist-section:last-child { margin-bottom: 0; }
  .tk-hist-summary {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; cursor: pointer; list-style: none; user-select: none;
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ink-dim);
  }
  .tk-hist-summary::-webkit-details-marker { display: none; }
  .tk-hist-count { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); }
  .tk-hist-body { padding-bottom: 4px; }
  .tk-hist-rec {
    background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 14px; margin-bottom: 8px;
  }
  .tk-hist-rec-head {
    display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px;
  }
  .tk-hist-rec-date { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); }
  .tk-hist-field-label {
    font-family: var(--mono); font-size: 10px; text-transform: uppercase;
    color: var(--ink-faint); margin: 8px 0 2px;
  }
  .tk-hist-field-val { font-size: 14px; line-height: 1.5; color: var(--ink); white-space: pre-wrap; }
  .tk-hist-edit-form { background: var(--bg-card); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .tk-hist-edit-actions { display: flex; gap: 10px; margin-top: 10px; }
  .tk-hist-inline {
    width: 100%; background: transparent; border: none;
    border-bottom: 1px solid transparent; padding: 2px 0;
    font: inherit; font-size: 14px; color: var(--ink);
    resize: vertical; box-sizing: border-box; line-height: 1.5;
    transition: border-color 0.15s; cursor: pointer;
  }
  .tk-hist-inline:hover { border-bottom-color: var(--line); }
  .tk-hist-inline:focus { outline: none; border-bottom-color: var(--amber); cursor: text; }
  .tk-hist-inline::placeholder { color: var(--ink-faint); font-style: italic; }
  .tk-hist-range-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .tk-hist-range-val { font-family: var(--mono); font-size: 13px; color: var(--ink-faint); min-width: 36px; }
  .tk-hist-chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
  .tk-hist-field-group { margin-bottom: 2px; }

  main { padding: 0 20px 120px; max-width: 560px; margin: 0 auto; text-align: left; }

  .date-line {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin: 8px 0 4px;
  }
  .greeting {
    font-size: 32px;
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -0.025em;
    margin: 0 0 40px;
    font-variation-settings: "opsz" 144;
    color: var(--ink-faint);
    text-align: center;
  }
  .greeting em { font-style: italic; color: var(--accent); font-weight: 300; }
  .greeting em.s-none { color: var(--good); }
  .greeting em.s-mild { color: var(--mid); }
  .greeting em.s-mod  { color: var(--low); }
  /* Backup nudge banner */
  .nudge {
    background: linear-gradient(135deg, rgba(82,152,188,0.08), rgba(58,80,103,0.05));
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 16px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .nudge-icon { font-family: var(--serif); font-style: italic; font-size: 24px; color: var(--accent); line-height: 1; }
  .nudge-text { flex: 1; }
  .nudge-title { font-size: 15px; font-weight: 500; }
  .nudge-desc { font-size: 12px; color: var(--ink-dim); margin-top: 2px; line-height: 1.4; }
  .nudge-actions { display: flex; gap: 8px; margin-top: 10px; }
  .nudge-btn {
    padding: 6px 14px;
    font-size: 12px;
    font-family: var(--mono);
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--bg-card);
    color: var(--ink);
  }
  .nudge-btn.primary { background: var(--accent); color: var(--paper); border-color: var(--accent); font-weight: 500; }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
    padding: 14px 16px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
  }
  .progress-bar { flex: 1; height: 6px; background: var(--bg-card); border-radius: 999px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--good), var(--mid), var(--low));
    border-radius: 999px;
    transition: width 0.4s cubic-bezier(.2,.7,.2,1);
  }
  .progress-text { font-family: var(--mono); font-size: 12px; color: var(--ink-dim); white-space: nowrap; }
  .score-pill {
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--bg-card);
    color: var(--ink-faint);
    white-space: nowrap;
  }
  .score-pill.s-none { border-color: var(--good); color: var(--good); }
  .score-pill.s-mild { border-color: var(--mid);  color: var(--mid); }
  .score-pill.s-mod  { border-color: var(--low);  color: var(--low); }
  .score-pill.s-sev  { border-color: var(--bad);  color: var(--bad); }

  .today-snapshot {
    margin-bottom: 24px;
    padding: 12px 16px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
  }

  .group-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin: 20px 0 8px;
  }
  .group-label::before {
    content: "";
    flex-shrink: 0;
    width: 7px; height: 7px;
    border-radius: 50%;
  }
  .group-label.gl-physical::before   { background: var(--sky); }
  .group-label.gl-behavioral::before { background: var(--amber); }
  .group-label.gl-feelings::before   { background: var(--rose); }
  .symptoms-wrap .group-label:first-child { margin-top: 0; }

  .metric {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 16px 14px;
    margin-bottom: 10px;
    transition: border-color 0.2s, background 0.2s;
  }
  .metric.rated {
    border-color: rgba(61, 88, 112, 0.25);
    background: linear-gradient(180deg, rgba(61, 88, 112, 0.04), transparent), var(--bg-elev);
  }
  /* Group accent: colored left bar via inset shadow */
  .metric.grp-physical   { box-shadow: inset 3px 0 0 rgba(82,  152, 188, 0.32); }
  .metric.grp-behavioral { box-shadow: inset 3px 0 0 rgba(197, 132,  98, 0.32); }
  .metric.grp-feelings   { box-shadow: inset 3px 0 0 rgba(141,  82, 138, 0.32); }
  /* Rated state tints the whole card in the group color */
  .metric.grp-physical.rated   { border-color: rgba(82,  152, 188, 0.28); background: linear-gradient(180deg, rgba(82,  152, 188, 0.05), transparent), var(--bg-elev); box-shadow: inset 3px 0 0 rgba(82,  152, 188, 0.55); }
  .metric.grp-behavioral.rated { border-color: rgba(197, 132,  98, 0.28); background: linear-gradient(180deg, rgba(197, 132,  98, 0.05), transparent), var(--bg-elev); box-shadow: inset 3px 0 0 rgba(197, 132,  98, 0.55); }
  .metric.grp-feelings.rated   { border-color: rgba(141,  82, 138, 0.28); background: linear-gradient(180deg, rgba(141,  82, 138, 0.05), transparent), var(--bg-elev); box-shadow: inset 3px 0 0 rgba(141,  82, 138, 0.55); }
  .metric-head { margin-bottom: 12px; text-align: left; }
  .metric-name { font-size: 19px; font-weight: 500; letter-spacing: -0.015em; line-height: 1.25; text-align: left; }
  .metric-desc { font-size: 13px; color: var(--ink-dim); line-height: 1.45; margin-top: 3px; text-align: left; }

  .rate-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .rate-btn {
    aspect-ratio: 1.9;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    transition: all 0.15s;
  }
  .rate-btn:active { transform: scale(0.94); }
  .rate-btn .rv { font-family: var(--serif); font-size: 15px; font-weight: 500; color: var(--ink-dim); line-height: 1; }
  .rate-btn .rl { font-family: var(--mono); font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-faint); }
  .rate-btn.selected { border-color: transparent; }
  .rate-btn.selected .rv { color: var(--paper); }
  .rate-btn.selected .rl { color: rgba(255,249,242,0.78); }
  .rate-btn.selected[data-val="0"] { background: var(--good); }
  .rate-btn.selected[data-val="1"] { background: var(--mid); }
  .rate-btn.selected[data-val="2"] { background: var(--low); }
  .rate-btn.selected[data-val="3"] { background: var(--bad); }

  .expand-btn {
    width: 100%;
    padding: 11px 16px;
    margin: 4px 0 20px;
    background: var(--bg-elev);
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-faint);
    text-align: center;
    transition: all 0.2s;
  }
  .expand-btn:active { background: var(--bg-card); }

  /* Optional symptoms: fade toward the background */
  .metric.optional-symptom { opacity: 0.42; transition: border-color 0.2s, background 0.2s, opacity 0.2s; }
  .metric.optional-symptom.rated { opacity: 0.80; }

  .note-section {
    margin-top: 24px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .note-section label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .note-section textarea {
    width: 100%;
    background: transparent;
    border: none;
    resize: none;
    margin-top: 8px;
    font-size: 15px;
    line-height: 1.5;
    min-height: 60px;
    outline: none;
  }
  .note-section textarea::placeholder { color: var(--ink-faint); }

  .saved-pill {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: var(--bg);
    padding: 10px 18px;
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    transition: transform 0.3s cubic-bezier(.2,.7,.2,1);
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .saved-pill.show { transform: translateX(-50%) translateY(0); }

  .history-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 24px;
  }
  .stat {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px;
    text-align: left;
  }
  .stat:nth-child(1) { box-shadow: inset 0 3px 0 rgba(77,  142, 101, 0.45); }
  .stat:nth-child(2) { box-shadow: inset 0 3px 0 rgba(168, 124,  46, 0.45); }
  .stat:nth-child(3) { box-shadow: inset 0 3px 0 rgba(160,  72,  72, 0.45); }
  .stat-val { font-size: 28px; font-weight: 500; font-variation-settings: "opsz" 144; letter-spacing: -0.02em; }
  .stat-val em { color: var(--accent); font-style: italic; font-weight: 300; }
  .stat-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-faint); margin-top: 2px; }

  .day-entry {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
  }
  .day-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .day-head-left { flex: 1; min-width: 0; }
  .day-date { font-size: 16px; font-weight: 500; text-align: left; }
  .day-meta { font-family: var(--mono); font-size: 12px; color: var(--ink-dim); margin-top: 2px; }
  .entry-actions { display: flex; gap: 5px; flex-shrink: 0; margin-left: 10px; padding-top: 1px; }
  .entry-action-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--bg-card);
    color: var(--ink-faint);
    transition: all 0.15s;
  }
  .entry-action-btn.primary { background: var(--accent); border-color: var(--accent); color: var(--paper); }
  .entry-action-btn.danger  { color: var(--danger); }
  .day-entry.editing {
    border-color: rgba(61, 88, 112, 0.30);
    background: linear-gradient(180deg, rgba(61, 88, 112, 0.04), transparent), var(--bg-elev);
  }
  .day-entry.editing[data-key] .entry-action-btn.primary {
    background: var(--slate); border-color: var(--slate);
  }
  .edit-rows { margin: 2px 0 10px; }
  .edit-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px dashed rgba(195, 207, 217, 0.5);
  }
  .edit-row:last-child { border-bottom: none; }
  .edit-row-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--ink); min-width: 0; }
  .edit-rate-row { display: flex; gap: 3px; flex-shrink: 0; }
  .edit-rate-btn {
    width: 34px; height: 30px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 7px;
    font-family: var(--serif);
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-dim);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
  }
  .edit-rate-btn:active { transform: scale(0.92); }
  .edit-rate-btn.selected { border-color: transparent; color: var(--paper); }
  .edit-rate-btn.selected[data-val="0"] { background: var(--good); }
  .edit-rate-btn.selected[data-val="1"] { background: var(--mid); }
  .edit-rate-btn.selected[data-val="2"] { background: var(--low); }
  .edit-rate-btn.selected[data-val="3"] { background: var(--bad); }
  .edit-note {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13px;
    color: var(--ink);
    line-height: 1.5;
    resize: none;
    min-height: 50px;
    outline: none;
    margin-top: 8px;
  }

  .snapshot-bottom {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .edit-note::placeholder { color: var(--ink-faint); }
  .day-dots { display: grid; grid-template-columns: repeat(14, 1fr); gap: 3px; }
  .dot { aspect-ratio: 1; border-radius: 3px; background: var(--bg-card); }
  .dot[data-val="0"] { background: var(--good); }
  .dot[data-val="1"] { background: var(--mid); }
  .dot[data-val="2"] { background: var(--low); }
  .dot[data-val="3"] { background: var(--bad); }
  .day-note {
    margin-top: 10px;
    font-size: 13px;
    color: var(--ink-dim);
    line-height: 1.5;
    padding-top: 10px;
    border-top: 1px dashed var(--line);
  }
  .empty { text-align: center; padding: 60px 20px; color: var(--ink-faint); }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin: 28px 0 10px;
  }
  .section-label:first-child { margin-top: 8px; }

  /* Symptom reference list in Setup */
  .symptom-list { list-style: none; padding: 0; margin: 0; }
  .symptom-item {
    padding: 9px 0;
    border-bottom: 1px dashed var(--line);
    display: flex;
    gap: 10px;
  }
  .symptom-item:last-child { border-bottom: none; }
  .symptom-grp { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); min-width: 66px; padding-top: 2px; }
  .symptom-name { font-size: 14px; font-weight: 500; }
  .symptom-name .opt-tag { font-family: var(--mono); font-size: 9px; color: var(--ink-faint); margin-left: 6px; font-weight: 400; }
  .symptom-desc { font-size: 12px; color: var(--ink-dim); font-style: italic; margin-top: 2px; line-height: 1.4; }

  .toggle-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
  }
  .toggle-row-text { flex: 1; }
  .toggle-title { font-size: 16px; font-weight: 500; }
  .toggle-desc { font-size: 12px; color: var(--ink-dim); margin-top: 2px; line-height: 1.4; }
  .switch {
    position: relative;
    width: 50px; height: 30px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 999px;
    flex-shrink: 0;
    margin-left: 12px;
    transition: background 0.2s;
  }
  .switch::after {
    content: "";
    position: absolute;
    top: 3px; left: 3px;
    width: 22px; height: 22px;
    background: var(--ink-dim);
    border-radius: 50%;
    transition: all 0.2s cubic-bezier(.2,.7,.2,1);
  }
  .switch.on { background: var(--accent); border-color: var(--accent); }
  .switch.on::after { left: 23px; background: var(--bg); }

  .time-input {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
  }
  .time-input input {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 16px;
    outline: none;
    color-scheme: dark;
  }

  .action-btn {
    width: 100%;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px;
    font-size: 14px;
    color: var(--ink);
    font-family: var(--mono);
    margin-bottom: 8px;
    transition: all 0.15s;
  }
  .action-btn:active { background: var(--bg-card); }
  .action-btn.danger { color: var(--danger); }
  .action-btn .badge { font-size: 10px; color: var(--ink-faint); margin-left: 8px; }

  .file-label {
    display: block;
    width: 100%;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px;
    font-size: 14px;
    color: var(--ink);
    font-family: var(--mono);
    margin-bottom: 8px;
    text-align: center;
    cursor: pointer;
  }
  .file-label input { display: none; }

  details.help {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    text-align: left;
  }
  details.help summary {
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    list-style: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  details.help summary::after { content: "+"; font-family: var(--mono); color: var(--accent); font-size: 18px; }
  details.help[open] summary::after { content: "−"; }
  details.help .body {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--line);
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink-dim);
  }
  details.help .body strong { color: var(--ink); font-weight: 500; }
  details.help .body code { font-family: var(--mono); background: var(--bg-card); padding: 1px 6px; border-radius: 4px; font-size: 12px; }
  details.help .body ol { padding-left: 20px; }
  details.help .body li { margin-bottom: 6px; }

  .view { display: none; animation: fadeIn 0.3s; }
  .view.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* ---------- Calm tab ---------- */
  .calm-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .calm-heading {
    font-size: 26px; font-weight: 400; letter-spacing: -0.02em;
    font-variation-settings: "opsz" 144; margin: 4px 0 6px;
  }
  .calm-sub {
    font-size: 14px; color: var(--ink-dim); line-height: 1.55; margin: 0 0 20px;
  }
  .calm-picker-label {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ink-faint); margin: 0 0 8px;
  }
  .calm-picker-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .calm-pick-btn {
    padding: 8px 16px; font-family: var(--mono); font-size: 13px;
    border: 1px solid var(--line); border-radius: 999px;
    background: var(--bg-elev); color: var(--ink-dim); transition: all 0.15s;
  }
  .calm-pick-btn.active { background: var(--accent); color: var(--paper); border-color: var(--accent); font-weight: 500; }
  .calm-pick-btn:active { opacity: 0.75; }
  #calm-panel[data-tab="breathing"]    .calm-pick-btn.active { background: var(--sky);    border-color: var(--sky);    }
  #calm-panel[data-tab="grounding"] .calm-pick-btn.active { background: var(--slate); border-color: var(--slate); }
  #calm-panel[data-tab="tea"]          .calm-pick-btn.active { background: var(--matcha);          border-color: var(--matcha);          }
  #calm-panel[data-tab="pmr"]          .calm-pick-btn.active { background: var(--amber);          border-color: var(--amber);          }
  #calm-panel[data-tab="pmr"] .switch.on { background: var(--amber); border-color: var(--amber); }

  .breath-phases-preview { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .breath-phases-preview span {
    font-family: var(--mono); font-size: 12px; color: var(--ink-faint);
    background: var(--bg-card); border-radius: 6px; padding: 4px 10px;
  }
  .breath-phases-preview strong { color: var(--ink); }

  .calm-stepper-row { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
  .calm-step-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--bg-elev); border: 1px solid var(--line);
    font-size: 22px; color: var(--ink);
    display: flex; align-items: center; justify-content: center; transition: all 0.12s;
  }
  .calm-step-btn:active { background: var(--bg-card); transform: scale(0.92); }
  .calm-step-val {
    font-family: var(--mono); font-size: 18px; font-weight: 500;
    color: var(--ink); min-width: 100px; text-align: center;
  }
  .calm-start-btn {
    width: 100%; padding: 14px;
    background: var(--accent); color: var(--paper); border: none;
    border-radius: var(--radius); font-family: var(--serif); font-size: 17px;
    font-weight: 500; font-variation-settings: "opsz" 144; letter-spacing: -0.01em;
    transition: opacity 0.15s;
  }
  .calm-start-btn:active { opacity: 0.78; }
  .calm-bottom-row { display: flex; gap: 8px; align-items: stretch; }
  .calm-bottom-row .calm-pick-btn { flex-shrink: 0; padding: 14px 20px; }
  .calm-bottom-row .calm-start-btn { flex: 1; width: auto; }

  /* Breathing circle */
  @keyframes breathGrow   { from { transform: scale(0.72) } to { transform: scale(1.28) } }
  @keyframes breathShrink { from { transform: scale(1.28) } to { transform: scale(0.72) } }
  .breath-circle-wrap { position: relative; width: 200px; height: 200px; margin: 20px auto; }
  .breath-ring { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .breath-ring-track { fill: none; stroke: var(--bg-card); stroke-width: 4; }
  .breath-ring-fill {
    fill: none; stroke: var(--sky); stroke-width: 4; stroke-linecap: round;
    stroke-dasharray: var(--breath-ring-circ); stroke-dashoffset: var(--breath-ring-circ);
    transform: rotate(-90deg); transform-origin: center;
    transition: stroke-dashoffset 0.9s linear;
  }
  .breath-ring-fill.release      { stroke: var(--sage); }
  .breath-ring-fill.phase-inhale { stroke: var(--sky); }
  .breath-ring-fill.phase-exhale { stroke: var(--sage); }
  .breath-ring-fill.phase-hold   { stroke: var(--ink-faint); opacity: 0.45; }
  .breath-ring-fill.pmr-tense    { stroke: var(--amber); }
  .breath-circle {
    position: absolute; top: 16px; left: 16px; right: 16px; bottom: 16px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, rgba(90,144,170,0.13), rgba(90,144,170,0.03) 60%, transparent);
    border: 1.5px solid rgba(90,144,170,0.30);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .breath-circle.release-mode {
    border-color: rgba(77,142,101,0.35);
    background: radial-gradient(circle at 40% 35%, rgba(77,142,101,0.10), rgba(77,142,101,0.02) 60%, transparent);
  }
  .breath-phase-label {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em;
    color: var(--ink-faint); margin-bottom: 4px;
  }
  .breath-count {
    font-size: 42px; font-weight: 400; letter-spacing: -0.04em;
    font-variation-settings: "opsz" 144; line-height: 1; color: var(--ink);
  }
  .breath-goal-info {
    font-family: var(--mono); font-size: 12px; color: var(--ink-faint);
    text-align: center; margin-top: 2px;
  }
  .breath-stop-btn {
    padding: 10px 28px; border: 1px solid var(--line); border-radius: 999px;
    font-family: var(--mono); font-size: 13px; color: var(--ink-dim);
    background: var(--bg-elev); margin-top: 12px; display: block; margin-left: auto; margin-right: auto;
    transition: all 0.12s;
  }
  .breath-stop-btn:active { background: var(--bg-card); }

  /* Imagery */
  .imagery-progress {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em;
    color: var(--ink-faint); margin-bottom: 10px;
  }
  .imagery-dots { display: flex; gap: 5px; margin-bottom: 18px; }
  .imagery-dot { height: 4px; flex: 1; border-radius: 999px; background: var(--bg-card); }
  .imagery-dot.done { background: var(--slate); opacity: 0.42; }
  .imagery-dot.current { background: var(--slate); }
  .imagery-text {
    background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 20px 18px;
    font-size: 15px; line-height: 1.75; color: var(--ink);
    margin-bottom: 18px;
  }
  .imagery-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .imagery-nav-btn {
    padding: 10px 22px; border: 1px solid var(--line); border-radius: 999px;
    font-family: var(--mono); font-size: 13px; color: var(--ink-dim);
    background: var(--bg-elev); transition: all 0.12s;
  }
  .imagery-nav-btn:active { background: var(--bg-card); }
  .imagery-nav-btn.primary { background: var(--slate); color: var(--paper); border-color: var(--slate); font-weight: 500; }

  /* Tea with emotions */
  .tea-input {
    width: 100%; padding: 14px 16px;
    background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: var(--radius); font-family: var(--serif); font-size: 17px;
    color: var(--ink); transition: border-color 0.15s;
  }
  .tea-input:focus { outline: none; border-color: var(--matcha); }
  .tea-input::placeholder { color: var(--ink-faint); }
  .tea-hint {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em;
    color: var(--ink-faint); margin: 8px 2px 22px;
  }
  .tea-cup-stage {
    position: relative; width: 200px; height: 220px;
    margin: 8px auto 22px;
  }
  .tea-cup-svg {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  }
  @keyframes teaSteam {
    0%   { transform: translate(0, 0)        scale(1);   opacity: 0;    }
    20%  {                                                opacity: 0.55; }
    60%  { transform: translate(6px, -42px)  scale(1.4); opacity: 0.32; }
    100% { transform: translate(-4px, -90px) scale(2.0); opacity: 0;    }
  }
  .tea-steam {
    position: absolute; bottom: 118px;
    width: 6px; height: 26px; border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, rgba(126,154,90,0.55), rgba(126,154,90,0) 70%);
    filter: blur(2.5px);
    animation: teaSteam 3.6s ease-out infinite;
  }
  .tea-steam.s1 { left: calc(50% - 18px); animation-delay: 0s;   }
  .tea-steam.s2 { left: calc(50% - 2px);  animation-delay: 1.2s; }
  .tea-steam.s3 { left: calc(50% + 14px); animation-delay: 2.4s; }
  .tea-visiting-label {
    text-align: center; font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 4px;
  }
  .tea-visiting-word {
    text-align: center; font-family: var(--serif); font-size: 22px;
    font-variation-settings: "opsz" 144; letter-spacing: -0.01em;
    color: var(--matcha); margin-bottom: 18px;
  }
  .tea-body {
    font-size: 15px; line-height: 1.7; color: var(--ink);
    text-align: center; max-width: 320px; margin: 0 auto 22px;
  }
  .tea-soft-close {
    display: block; margin: 0 auto;
    padding: 10px 26px; border: 1px solid var(--line); border-radius: 999px;
    font-family: var(--mono); font-size: 12px; color: var(--ink-dim);
    background: transparent; transition: all 0.15s;
  }
  .tea-soft-close:active { background: var(--bg-card); }

  /* PMR */
  .pmr-group-list {
    background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: var(--radius); overflow: hidden; margin-bottom: 20px;
  }
  .pmr-preview-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 14px;
    border-bottom: 1px dashed rgba(195,207,217,0.5);
  }
  .pmr-preview-item:last-child { border-bottom: none; }
  .pmr-preview-num { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); min-width: 18px; }
  .pmr-preview-name { font-size: 14px; font-weight: 500; }
  .pmr-settings-head {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;
  }
  .pmr-settings-head .calm-heading { margin: 0; }
  .pmr-group-toggle {
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    padding: 12px 14px; background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: 10px; margin-bottom: 6px; cursor: pointer; transition: background 0.12s;
  }
  .pmr-group-toggle:active { background: var(--bg-card); }
  .pmr-group-toggle.active { border-color: rgba(179,106,62,0.35); }
  .pmr-group-toggle-name { font-size: 15px; font-weight: 500; flex: 1; }
  .pmr-reorder-btns { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
  .pmr-reorder-btn {
    width: 26px; height: 21px; border-radius: 4px; font-size: 11px;
    background: var(--bg-card); border: 1px solid var(--line); color: var(--ink-dim);
    display: flex; align-items: center; justify-content: center; transition: all 0.1s;
  }
  .pmr-reorder-btn:active:not(:disabled) { background: var(--line); transform: scale(0.9); }
  .pmr-reorder-btn:disabled { opacity: 0.2; cursor: default; }

  /* Start button color variants */
  .clr-mid-btn     { background: var(--sky)    !important; }
  .clr-good-btn    { background: var(--slate) !important; }
  .clr-low-btn     { background: var(--amber)          !important; }
  .clr-imagery-btn { background: var(--slate) !important; }

  /* Grounding */
  .grd-sense-prompt {
    font-size: 22px; font-weight: 400; letter-spacing: -0.02em;
    font-variation-settings: "opsz" 144; text-align: center; margin: 4px 0 22px; line-height: 1.3;
  }
  .grd-sense-prompt em { font-style: italic; }
  .grd-sense-prompt em.clr-sky    { color: var(--sky); }
  .grd-sense-prompt em.clr-slate  { color: var(--slate); }
  .grd-sense-prompt em.clr-sage   { color: var(--sage); }
  .grd-sense-prompt em.clr-amber  { color: var(--amber); }
  .grd-sense-prompt em.clr-rose   { color: var(--rose); }
  .grd-tap-btn {
    width: 156px; height: 156px; border-radius: 50%; border: 2px solid var(--slate);
    background: rgba(74,138,103,0.08);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin: 0 auto 20px; transition: transform 0.1s, opacity 0.1s; cursor: pointer;
  }
  .grd-tap-btn:active { transform: scale(0.93); opacity: 0.72; }
  .grd-tap-btn[data-color="sky"]    { border-color: var(--sky);    background: rgba(82,152,188,0.09); }
  .grd-tap-btn[data-color="slate"]  { border-color: var(--slate);  background: rgba(61,88,112,0.09); }
  .grd-tap-btn[data-color="sage"]   { border-color: var(--sage);   background: rgba(90,126,112,0.09); }
  .grd-tap-btn[data-color="amber"]  { border-color: var(--amber);  background: rgba(141,82,138,0.09); }
  .grd-tap-btn[data-color="rose"]   { border-color: var(--rose);   background: rgba(197,132,98,0.09); }
  .grd-tap-count { font-size: 52px; font-weight: 400; letter-spacing: -0.04em; font-variation-settings: "opsz" 144; line-height: 1; color: var(--ink); }
  .grd-tap-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; color: var(--ink-faint); text-transform: uppercase; margin-top: 5px; }
  .grd-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
  .grd-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--bg-card); border: 1.5px solid var(--line); transition: all 0.2s; }
  .grd-dot.filled                    { background: var(--slate); border-color: var(--slate); }
  .grd-dot.filled[data-color="sky"]   { background: var(--sky);    border-color: var(--sky);    }
  .grd-dot.filled[data-color="slate"] { background: var(--slate);  border-color: var(--slate);  }
  .grd-dot.filled[data-color="sage"]  { background: var(--sage);   border-color: var(--sage);   }
  .grd-dot.filled[data-color="amber"] { background: var(--amber);  border-color: var(--amber);  }
  .grd-dot.filled[data-color="rose"]  { background: var(--rose);   border-color: var(--rose);   }
  .grd-narration {
    width: 100%; min-height: 180px; background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 16px; font-size: 15px; color: var(--ink);
    line-height: 1.7; resize: none; outline: none; margin-bottom: 16px;
    font-family: var(--serif); font-variation-settings: "opsz" 144;
  }
  .grd-narration::placeholder { color: var(--ink-faint); font-style: italic; }
  .narr-hist-entry {
    background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: 10px; margin-bottom: 6px; overflow: hidden;
  }
  .narr-hist-date {
    cursor: pointer; list-style: none; padding: 11px 14px;
    font-family: var(--mono); font-size: 12px; color: var(--ink-dim);
    display: flex; justify-content: space-between; align-items: center;
    user-select: none;
  }
  .narr-hist-date::after { content: "+"; font-size: 16px; color: var(--slate); }
  .narr-hist-entry[open] .narr-hist-date::after { content: "−"; }
  .narr-hist-body {
    padding: 12px 14px 12px; font-size: 14px; line-height: 1.65;
    color: var(--ink-dim); border-top: 1px dashed var(--line);
  }
  .narr-hist-text { font-style: italic; margin-bottom: 12px; }
  .narr-hist-actions { display: flex; gap: 6px; }

  .pmr-group-toggle:not(.active) .pmr-group-toggle-name { color: var(--ink-faint); }
  .pmr-dur-row {
    display: flex; gap: 20px; margin-bottom: 18px;
  }
  .pmr-dur-item {
    flex: 1; display: flex; flex-direction: column; gap: 4px;
  }
  .pmr-dur-label {
    font-size: 12px; color: var(--ink-faint); font-family: var(--mono);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .pmr-dur-label span { font-size: 13px; color: var(--ink); font-weight: 500; }
  .pmr-dur-slider {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; border-radius: 2px;
    background: var(--line); outline: none; cursor: pointer;
  }
  .pmr-dur-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--amber); border: 2px solid var(--paper);
    box-shadow: 0 1px 4px rgba(0,0,0,0.18); cursor: pointer;
  }
  .pmr-dur-slider::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--amber); border: 2px solid var(--paper);
    box-shadow: 0 1px 4px rgba(0,0,0,0.18); cursor: pointer;
  }
  .pmr-step-info {
    font-family: var(--mono); font-size: 12px; color: var(--ink-faint); text-align: center; margin-bottom: 2px;
  }
  .pmr-instruction {
    font-size: 15px; line-height: 1.55; color: var(--ink-dim); margin: 8px 0 20px;
    padding: 14px 16px; background: var(--bg-elev); border-radius: var(--radius);
    border: 1px solid var(--line);
  }

  .loading { text-align: center; padding: 80px 20px; color: var(--ink-faint); }

  /* ---------- Home screen ---------- */
  .back-btn {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-dim);
    display: flex;
    align-items: center;
    gap: 3px;
    padding: 6px 0;
    opacity: 0.8;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .back-btn:active { opacity: 0.45; }
  .back-btn.hidden { display: none !important; }

  .home-hero { padding: 4px 0 26px; }
  .home-tagline {
    font-size: 34px;
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -0.025em;
    font-variation-settings: "opsz" 144;
    margin: 6px 0 5px;
  }
  .home-tagline em { font-style: italic; color: var(--accent); font-weight: 300; }
  .home-sub {
    font-size: 14px;
    color: var(--ink-dim);
    margin: 0;
  }

  /* ---------- Work Through It tab ---------- */
  .wt-heading {
    font-size: 28px; font-weight: 400; letter-spacing: -0.02em;
    font-variation-settings: "opsz" 144; margin: 4px 0 6px;
  }
  .wt-sub {
    font-size: 14px; color: var(--ink-dim); line-height: 1.55; margin: 0 0 24px;
  }
  .wt-primary-btn {
    width: 100%; padding: 15px;
    background: var(--amber); color: var(--paper); border: none;
    border-radius: var(--radius); font-family: var(--serif); font-size: 17px;
    font-weight: 500; font-variation-settings: "opsz" 144; letter-spacing: -0.01em;
    transition: opacity 0.15s; margin-bottom: 8px;
  }
  .wt-primary-btn:active { opacity: 0.78; }
  .wt-primary-btn:disabled { opacity: 0.4; cursor: default; }

  .wt-secondary-btn {
    width: 100%; padding: 13px;
    background: var(--bg-elev); color: var(--ink); border: 1px solid var(--line);
    border-radius: var(--radius); font-family: var(--serif); font-size: 15px;
    transition: all 0.15s; margin-bottom: 8px;
  }
  .wt-secondary-btn:active { background: var(--bg-card); }

  /* Progress dots */
  .wt-progress-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .wt-progress-dots {
    display: flex; gap: 7px; align-items: center;
  }
  .wt-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--bg-card); border: 1.5px solid var(--line);
    transition: all 0.2s;
  }
  .wt-dot.active { background: var(--amber); border-color: var(--amber); width: 11px; height: 11px; }
  .wt-dot.done   { background: var(--amber); border-color: var(--amber); opacity: 0.45; }

  .wt-skip-link {
    font-family: var(--mono); font-size: 12px; color: var(--amber);
    background: none; border: none; cursor: pointer; padding: 4px 0;
    text-decoration: none; white-space: nowrap;
  }
  .wt-skip-link:active { opacity: 0.6; }

  .wt-step-label {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ink-faint); margin-bottom: 6px;
  }
  .wt-step-heading {
    font-size: 24px; font-weight: 400; letter-spacing: -0.02em;
    font-variation-settings: "opsz" 144; margin: 0 0 16px;
  }
  .wt-back-btn {
    font-family: var(--mono); font-size: 12px; color: var(--ink-dim);
    background: none; border: none; cursor: pointer; padding: 4px 0;
    display: flex; align-items: center; gap: 3px; margin-bottom: 16px;
  }
  .wt-back-btn:active { opacity: 0.6; }

  /* Textarea */
  .wt-textarea {
    width: 100%; min-height: 100px;
    background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 14px 16px;
    font-size: 15px; color: var(--ink); font-family: var(--serif);
    line-height: 1.6; resize: none; outline: none; margin-bottom: 10px;
    transition: border-color 0.2s;
  }
  .wt-textarea:focus { border-color: var(--amber); }
  .wt-textarea::placeholder { color: var(--ink-faint); font-style: italic; }

  /* Chip picker */
  .wt-chips-row { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
  .wt-chip {
    padding: 7px 14px; font-family: var(--mono); font-size: 12px;
    border: 1px solid var(--line); border-radius: 999px;
    background: var(--bg-elev); color: var(--ink-dim); transition: all 0.15s;
    cursor: pointer;
  }
  .wt-chip:active { opacity: 0.7; }
  .wt-chip.selected { background: var(--amber); border-color: var(--amber); color: var(--paper); font-weight: 500; }

  /* Thought check · triage */
  .tc-question {
    font-size: 19px; font-weight: 400; color: var(--ink-dim);
    letter-spacing: -0.015em; line-height: 1.4; margin: 2px 0 18px;
    font-variation-settings: "opsz" 144;
    animation: tcRise 0.35s both;
  }
  .tc-question em { font-style: italic; color: var(--accent); }
  .tc-cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .tc-card {
    display: flex; align-items: center; gap: 14px;
    width: 100%; text-align: left; cursor: pointer;
    border: 1px solid var(--line); border-radius: var(--radius);
    padding: 15px 16px 16px;
    transition: transform 0.15s, border-color 0.15s;
    animation: tcRise 0.4s both;
  }
  .tc-card:active { transform: scale(0.985); }
  .tc-card-body { flex: 1; min-width: 0; }
  .tc-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 9px; font-weight: 500;
    letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 8px;
  }
  .tc-tag::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .tc-card-title {
    font-size: 16.5px; font-weight: 400; letter-spacing: -0.01em;
    color: var(--ink); line-height: 1.3;
  }
  .tc-card-sub   { font-size: 12.5px; color: var(--ink-dim); line-height: 1.45; margin-top: 4px; white-space: pre-line; }
  .tc-card-meta  { display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .tc-card-arrow { flex-shrink: 0; font-family: var(--mono); font-size: 15px; }

  /* color variants — sky · sage · gold · slate · matcha · amber */
  .tc-card--sky    { background: linear-gradient(180deg, rgba(82,152,188,0.055), transparent 62%), var(--bg-elev); box-shadow: inset 3px 0 0 var(--sky); }
  .tc-card--sage   { background: linear-gradient(180deg, rgba(90,126,112,0.055), transparent 62%), var(--bg-elev); box-shadow: inset 3px 0 0 var(--sage); }
  .tc-card--gold   { background: linear-gradient(180deg, rgba(168,124,46,0.055), transparent 62%), var(--bg-elev); box-shadow: inset 3px 0 0 var(--mid); }
  .tc-card--slate  { background: linear-gradient(180deg, rgba(61,88,112,0.055),  transparent 62%), var(--bg-elev); box-shadow: inset 3px 0 0 var(--slate); }
  .tc-card--matcha { background: linear-gradient(180deg, rgba(126,154,90,0.055), transparent 62%), var(--bg-elev); box-shadow: inset 3px 0 0 var(--matcha); }
  .tc-card--amber  { background: linear-gradient(180deg, rgba(141,82,138,0.055), transparent 62%), var(--bg-elev); box-shadow: inset 3px 0 0 var(--amber); }

  .tc-card--sky:active    { border-color: rgba(82,152,188,0.42); }
  .tc-card--sage:active   { border-color: rgba(90,126,112,0.42); }
  .tc-card--gold:active   { border-color: rgba(168,124,46,0.42); }
  .tc-card--slate:active  { border-color: rgba(61,88,112,0.42);  }
  .tc-card--matcha:active { border-color: rgba(126,154,90,0.42); }
  .tc-card--amber:active  { border-color: rgba(141,82,138,0.42); }

  .tc-card--sky    .tc-tag, .tc-card--sky    .tc-card-arrow { color: var(--sky); }
  .tc-card--sage   .tc-tag, .tc-card--sage   .tc-card-arrow { color: var(--sage); }
  .tc-card--gold   .tc-tag, .tc-card--gold   .tc-card-arrow { color: var(--mid); }
  .tc-card--slate  .tc-tag, .tc-card--slate  .tc-card-arrow { color: var(--slate); }
  .tc-card--matcha .tc-tag, .tc-card--matcha .tc-card-arrow { color: var(--matcha); }
  .tc-card--amber  .tc-tag, .tc-card--amber  .tc-card-arrow { color: var(--amber); }

  @keyframes tcRise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .wt-helper-details {
    margin-top: 10px; background: var(--bg-card);
    border: 1px dashed var(--line); border-radius: 10px; padding: 12px 14px;
  }
  .wt-helper-details summary {
    cursor: pointer; font-family: var(--mono); font-size: 11px;
    color: var(--ink-faint); letter-spacing: 0.1em; list-style: none;
    display: flex; justify-content: space-between; align-items: center; user-select: none;
  }
  .wt-helper-details summary::after { content: "+"; color: var(--amber); }
  .wt-helper-details[open] summary::after { content: "−"; }
  .wt-helper-ta {
    width: 100%; margin-top: 10px; min-height: 60px;
    background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: 8px; padding: 10px 12px;
    font-family: var(--serif); font-size: 13px; color: var(--ink);
    line-height: 1.5; resize: none; outline: none;
  }
  .wt-helper-ta::placeholder { color: var(--ink-faint); font-style: italic; }
  .wt-helper-label { font-size: 12px; color: var(--ink-dim); margin-top: 10px; margin-bottom: 3px; }

  /* Action tool cards */
  .wt-action-cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .wt-action-card {
    background: var(--bg-elev); border: 1.5px solid var(--line);
    border-radius: var(--radius); padding: 15px 17px;
    text-align: left; cursor: pointer; transition: all 0.15s; width: 100%;
  }
  .wt-action-card:active { background: var(--bg-card); }
  .wt-action-card.selected {
    border-color: var(--amber);
    background: linear-gradient(180deg, rgba(141,82,138,0.05), transparent), var(--bg-elev);
  }
  .wt-action-title { font-size: 17px; font-weight: 500; letter-spacing: -0.01em; margin-bottom: 2px; }
  .wt-action-desc  { font-size: 13px; color: var(--ink-dim); }

  /* Inline action panel */
  .wt-inline-tool {
    background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 18px 18px 14px;
    margin-top: 6px;
  }
  .wt-tool-lesson {
    font-style: italic; color: var(--amber); font-size: 14px;
    line-height: 1.5; margin-bottom: 16px; padding: 12px 14px;
    background: rgba(141,82,138,0.07); border-radius: 8px;
    border-left: 3px solid var(--amber);
  }
  .wt-tool-label {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ink-faint); margin-bottom: 8px;
  }
  .wt-tool-helper {
    font-size: 13px; color: var(--ink-dim); line-height: 1.5; margin-bottom: 10px;
  }
  /* SUDS slider */
  .wt-suds-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .wt-suds-val {
    font-family: var(--mono); font-size: 22px; font-weight: 500;
    color: var(--ink); min-width: 40px; text-align: right;
  }
  .wt-slider {
    flex: 1; height: 6px; -webkit-appearance: none; appearance: none;
    background: var(--bg-card); border-radius: 999px; outline: none;
    border: 1px solid var(--line);
  }
  .wt-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 22px; height: 22px;
    border-radius: 50%; background: var(--amber); cursor: pointer;
    border: 2px solid var(--paper); box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  /* Timer */
  .wt-timer-display {
    font-family: var(--mono); font-size: 42px; font-weight: 500;
    color: var(--ink); text-align: center; letter-spacing: -0.02em;
    margin: 14px 0;
  }
  .wt-timer-hint {
    font-size: 12px; color: var(--ink-faint); text-align: center;
    font-style: italic; margin-bottom: 14px; line-height: 1.4;
  }

  /* Reframing cheatsheet · side drawer */
  .rcs-backdrop {
    position: fixed; inset: 0;
    background: rgba(42,30,20,0.42);
    backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    opacity: 0; transition: opacity 0.25s; z-index: 200;
  }
  .rcs-backdrop.open { opacity: 1; }
  .rcs-drawer {
    position: fixed; top: 0; right: 0; height: 100%;
    width: min(380px, 88vw);
    background: var(--bg);
    border-left: 1px solid var(--line);
    box-shadow: -12px 0 40px rgba(42,30,20,0.20);
    transform: translateX(102%);
    transition: transform 0.28s cubic-bezier(.2,.7,.2,1);
    z-index: 201;
    display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top);
  }
  .rcs-drawer.open { transform: none; }
  .rcs-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 12px;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(141,82,138,0.06), transparent);
  }
  .rcs-eyebrow {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--amber); margin-bottom: 4px;
  }
  .rcs-title {
    font-size: 22px; font-weight: 400; letter-spacing: -0.02em;
    font-variation-settings: "opsz" 144; color: var(--ink); line-height: 1.1;
  }
  .rcs-close {
    width: 44px; height: 44px; border-radius: 50%;
    border: 1px solid var(--line); background: var(--bg-elev);
    font-size: 20px; line-height: 1; color: var(--ink-dim);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; cursor: pointer; padding: 0;
  }
  .rcs-close:active { background: var(--bg-card); }
  .rcs-body {
    flex: 1; overflow-y: auto; padding: 14px 18px 30px;
    -webkit-overflow-scrolling: touch;
  }
  .rcs-intro {
    font-size: 12.5px; color: var(--ink-dim); line-height: 1.55;
    margin: 4px 0 14px; font-style: italic;
  }
  .rcs-pat {
    display: flex; align-items: flex-start; gap: 12px;
    width: 100%; text-align: left; cursor: pointer;
    background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: 10px; padding: 12px 14px;
    margin-bottom: 6px;
    transition: background 0.12s, border-color 0.12s;
  }
  .rcs-pat:active { background: var(--bg-card); }
  .rcs-pat.open {
    border-color: rgba(141,82,138,0.42);
    background: linear-gradient(180deg, rgba(141,82,138,0.06), transparent), var(--bg-elev);
  }
  .rcs-pat-head { flex: 1; min-width: 0; }
  .rcs-pat-name { font-size: 14.5px; font-weight: 500; color: var(--ink); line-height: 1.25; }
  .rcs-pat-desc { font-size: 11.5px; color: var(--ink-dim); margin-top: 3px; line-height: 1.45; }
  .rcs-pat-chev {
    font-family: var(--mono); font-size: 15px; color: var(--amber);
    flex-shrink: 0; line-height: 1; padding-top: 2px;
  }
  .rcs-thoughts {
    display: flex; flex-direction: column; gap: 5px;
    margin: -2px 6px 14px;
  }
  .rcs-thought {
    display: flex; align-items: flex-start; gap: 10px;
    width: 100%; text-align: left; cursor: pointer;
    background: transparent; border: 1px dashed rgba(141,82,138,0.30);
    border-radius: 8px; padding: 9px 12px;
    transition: background 0.12s, border-color 0.12s;
  }
  .rcs-thought:active { background: rgba(141,82,138,0.08); }
  .rcs-thought-text {
    flex: 1; font-size: 13px; color: var(--ink-dim);
    line-height: 1.55; font-style: italic;
  }
  .rcs-thought-add {
    font-family: var(--mono); font-size: 13px; color: var(--amber);
    flex-shrink: 0; padding-top: 1px;
  }
  .rcs-thought.inserted {
    background: rgba(141,82,138,0.10);
    border-style: solid; border-color: var(--amber);
  }
  .rcs-thought.inserted .rcs-thought-add { color: var(--amber); }

  /* Cheatsheet trigger link · in-step */
  .rcs-trigger {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: var(--mono); font-size: 11px; color: var(--amber);
    background: none; border: none; padding: 4px 0; cursor: pointer;
    margin: -4px 0 12px;
  }
  .rcs-trigger:active { opacity: 0.6; }

  /* Reframe-prompts secondary field */
  .rcs-notes-label {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ink-faint);
    margin: 2px 0 6px;
  }
  .rcs-notes-textarea {
    width: 100%; min-height: 60px;
    background: rgba(141,82,138,0.04);
    border: 1px solid var(--line); border-radius: var(--radius);
    padding: 12px 14px;
    font-family: var(--serif); font-size: 14px; color: var(--ink);
    line-height: 1.55; resize: none; outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .rcs-notes-textarea:focus { border-color: var(--amber); }
  .rcs-notes-textarea::placeholder { color: var(--ink-faint); font-style: italic; }

  /* Self-compassion · ambient lines + self-as-friend toggle */
  .sc-line {
    font-size: 13.5px; color: var(--ink-dim); line-height: 1.55;
    margin: 6px 0 14px;
  }
  .sc-row {
    display: flex; align-items: center; gap: 8px;
    margin: 10px 0 4px;
  }
  .sc-row .wt-tool-helper { flex: 1; margin-bottom: 0; }
  .sc-row-label {
    flex: 1; min-width: 0;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--ink-faint);
  }
  .sc-chip {
    font-family: var(--mono); font-size: 11px; padding: 5px 14px;
    border: 1px solid var(--line); border-radius: 999px;
    background: var(--bg-elev); color: var(--ink-dim);
    cursor: pointer; transition: all 0.12s;
  }
  .sc-chip:active { opacity: 0.7; }
  .sc-chip.selected {
    background: var(--amber); border-color: var(--amber);
    color: var(--paper); font-weight: 500;
  }

  /* Final check */
  .wt-final-options { display: flex; flex-direction: column; gap: 8px; margin: 16px 0; }
  .wt-final-btn {
    background: var(--bg-elev); border: 1.5px solid var(--line);
    border-radius: var(--radius); padding: 15px 18px;
    text-align: left; font-size: 16px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  .wt-final-btn:active { background: var(--bg-card); }
  .wt-skip-final {
    font-family: var(--mono); font-size: 12px; color: var(--ink-faint);
    background: none; border: none; cursor: pointer; display: block;
    text-align: center; padding: 8px; margin: 4px auto;
  }

  /* History filter chips */
  .history-filter-row { display: flex; gap: 7px; margin-bottom: 18px; flex-wrap: wrap; }
  .hist-filter-chip {
    padding: 6px 14px; font-family: var(--mono); font-size: 12px;
    border: 1px solid var(--line); border-radius: 999px;
    background: var(--bg-elev); color: var(--ink-dim); cursor: pointer; transition: all 0.15s;
  }
  .hist-filter-chip.active { background: var(--ink); border-color: var(--ink); color: var(--bg); font-weight: 500; }

  /* Work-through history entry */
  .wt-entry { border-left: 3px solid var(--amber); cursor: pointer; }
  .wt-entry .day-head { margin-bottom: 6px; }
  .wt-entry-situation { font-size: 14px; color: var(--ink); margin-bottom: 8px; font-style: italic; line-height: 1.4; }
  .wt-entry-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .wt-entry-chip {
    padding: 3px 9px; font-family: var(--mono); font-size: 10px;
    border-radius: 999px; border: 1px solid var(--line);
    background: var(--bg-card); color: var(--ink-faint);
  }
  .wt-branch-badge {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em;
    padding: 3px 9px; border-radius: 999px; font-weight: 500;
  }
  .wt-branch-badge.branch-A     { background: rgba(77,142,101,0.15);  color: var(--good); border: 1px solid rgba(77,142,101,0.3); }
  .wt-branch-badge.branch-B_mild { background: rgba(168,124,46,0.15); color: var(--mid);  border: 1px solid rgba(168,124,46,0.3); }
  .wt-branch-badge.branch-B_severe { background: rgba(160,72,72,0.15); color: var(--bad); border: 1px solid rgba(160,72,72,0.3); }
  .wt-branch-badge.branch-C      { background: rgba(82,152,188,0.15); color: var(--accent); border: 1px solid rgba(82,152,188,0.3); }
  .wt-entry-detail { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--line); display: none; }
  .wt-entry.expanded .wt-entry-detail { display: block; }
  .wt-detail-row { font-size: 13px; color: var(--ink-dim); margin-bottom: 6px; line-height: 1.5; }
  .wt-detail-row strong { color: var(--ink); }

  /* Projects section */
  .wt-section-head {
    display: flex; justify-content: space-between; align-items: center;
    margin: 28px 0 12px;
  }
  .wt-section-title {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--ink-faint);
  }
  .wt-new-btn {
    font-family: var(--mono); font-size: 11px; color: var(--amber);
    border: 1px solid var(--amber); border-radius: 999px;
    padding: 4px 12px; background: none; cursor: pointer; transition: all 0.12s;
  }
  .wt-new-btn:active { background: rgba(141,82,138,0.1); }

  .wt-project-card {
    background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: var(--radius); margin-bottom: 8px; overflow: hidden;
  }
  .wt-project-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 15px; cursor: pointer; user-select: none;
  }
  .wt-project-head:active { background: var(--bg-card); }
  .wt-project-name { font-size: 16px; font-weight: 500; flex: 1; }
  .wt-project-meta { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); }
  .wt-project-toggle { font-family: var(--mono); font-size: 15px; color: var(--amber); margin-left: 10px; }
  .wt-project-steps { border-top: 1px dashed var(--line); display: none; }
  .wt-project-card.open .wt-project-steps { display: block; }
  .wt-project-card.open .wt-project-toggle::after { content: "−"; }
  .wt-project-toggle::after { content: "+"; }
  .wt-step-row {
    display: flex; align-items: center; gap: 10px; padding: 11px 15px;
    border-bottom: 1px dashed rgba(195,207,217,0.5);

<script>
// ---------- Symptoms (Hamilton Anxiety Rating Scale, 0–3 per item) ----------

// Per-button labels shown in rate rows (indexed 0-3). severityLabel() maps an avg score to a different vocabulary.
const SCORE_LABELS = ['none', 'mild', 'mod', 'severe'];
const BACKUP_INTERVAL_DAYS = 7;

const META_KEY         = 'nagi.meta.v1';
const HAMA_KEY         = 'nagi.hama.v1';

const PATTERNS = [
  {
    id: 'pessimism',
    label: 'Pessimism',
    description: 'Expecting the worst outcome even without evidence',
    thoughts: [
      "I don't know what is going to happen.",

  {

    thoughts: [

    ]
  },
  {
    id: 'mind_reading',
    label: 'Mind reading',
    description: "Assuming you know what others are thinking, usually negatively",

  },
  {
    id: 'cognitive_fusion',
    label: 'Cognitive fusion',
    description: 'Treating your thoughts as facts rather than mental events',
    thoughts: [

  {

    thoughts: [

    ]
  },
  {
    id: 'labeling',
    label: 'Labeling',
    description: 'Attaching a global negative label to yourself or others based on one event',
    thoughts: [
      "I made a mistake — that doesn't make me a failure.",
      "One action doesn't define a whole person.",
      "Would I label a friend this way for the same thing?",
      "Behavior is specific; labels are global and unfair.",
    ]
  },
  {
    id: 'mental_filter',
    label: 'Mental filter',
    description: 'Focusing exclusively on negatives while ignoring the full picture',
    thoughts: [
      "What am I leaving out of this picture?",
      "If I zoom out, what else is true?",
      "Is this one detail getting more weight than it deserves?",
      "What would a balanced account of this situation look like?",
    ]
  },
];

// ---------- Sleep checklist ----------
const SLEEP_RANGES = [
  { id: 'morning', name: 'Morning', time: '6–8 am', items: [
    { id: 'm1', text: 'Total sleep >7.5 hours' },
    { id: 'm2', text: 'Wake up at a consistent time' },
    { id: 'm3', text: 'Wake up feeling well rested' },
  ]},
  { id: 'day', name: 'Day', time: '8 am – 6 pm', items: [
    { id: 'd1', text: 'Exposure to daylight / bright light' },
    { id: 'd2', text: 'No caffeine after 3 pm' },
    { id: 'd3', text: 'No naps beyond a 20min power nap' },
  ]},
  { id: 'evening', name: 'Evening', time: '6–10 pm', items: [
    { id: 'e1', text: 'No large meals 2 hours before bed' },
    { id: 'e2', text: 'No intense exercise 1 hour before bed' },
    { id: 'e3', text: 'No screens (except ebooks) 30min before bed' },
  ]},
  { id: 'night', name: 'Night', time: '10 pm – 6 am', items: [
    { id: 'n1', text: 'No work or other activities in bed' },
    { id: 'n2', text: 'Dark, cool bedroom and a comfortable bed' },
    { id: 'n3', text: 'Ritual before bed', nice: true },
    { id: 'n4', text: 'Calming technique before bed', nice: true },
    { id: 'n5', text: 'Go to sleep at a consistent time' },
    { id: 'n6', text: 'Go to sleep at an early time' },
  ], tips: [
    'If anxious thoughts keep you awake, play an audiobook or podcast to replace them with neutral thoughts — keep screen light low.',
    'If you are still awake after 30 minutes, get up and do something relaxing in low light until you feel sleepy, then return to bed.',
  ]},
];
const SLEEP_ITEM_COUNT = SLEEP_RANGES.reduce((n, r) => n + r.items.length, 0);

// ---------- Stores ----------
let metaStore  = { lastBackup: null, nudgeDismissedUntil: null, pmrShown: {}, pmrOrder: [], pmrTenseSec: 3, pmrRelaxSec: 10 };
let hamaStore  = { history: {} };
let calmStore  = { narrations: {} };
let sleepStore = { history: {} };

let sleepState = { tab: 'today', rangeIdx: 0, dayOffset: 0, editId: null };

// ---------- Load / Persist ----------
function loadMeta() {
  try { const r = localStorage.getItem(META_KEY); if (r) metaStore = { ...metaStore, ...JSON.parse(r) }; }
  catch(e) { console.error('Meta load failed:', e); }
}
function persistMeta() {
  try { localStorage.setItem(META_KEY, JSON.stringify(metaStore)); }
  catch(e) { console.error('Meta save failed:', e); alert('Could not save. Your browser storage may be full.'); }
}
function loadHama() {
  try { const r = localStorage.getItem(HAMA_KEY); if (r) hamaStore = { history: {}, ...JSON.parse(r) }; }
  catch(e) { console.error('HAMA load failed:', e); }
}
function persistHama() {
  try { localStorage.setItem(HAMA_KEY, JSON.stringify(hamaStore)); }
  catch(e) { console.error('HAMA save failed:', e); alert('Could not save. Your browser storage may be full.'); }
}
function loadCalm() {
  try { const r = localStorage.getItem(CALM_KEY); if (r) calmStore = { narrations: {}, ...JSON.parse(r) }; }
  catch(e) { console.error('Calm load failed:', e); }
}
function persistCalm() {
  try { localStorage.setItem(CALM_KEY, JSON.stringify(calmStore)); }
  catch(e) { console.error('Calm save failed:', e); alert('Could not save. Your browser storage may be full.'); }
}
function loadSleep() {
  try { const r = localStorage.getItem(SLEEP_KEY); if (r) sleepStore = { history: {}, ...JSON.parse(r) }; }
  catch(e) { console.error('Sleep load failed:', e); }
}
function persistSleep() {
  try { localStorage.setItem(SLEEP_KEY, JSON.stringify(sleepStore)); }
  catch(e) { console.error('Sleep save failed:', e); alert('Could not save. Your browser storage may be full.'); }
}
function loadTkThought()       { try { return JSON.parse(localStorage.getItem(TK_THOUGHT_KEY)   || '[]'); } catch(e){ return []; } }
function saveTkThought(arr)    { try { localStorage.setItem(TK_THOUGHT_KEY,   JSON.stringify(arr)); } catch(e){} }
(function(){ const clean = loadTkThought().filter(r => r.branch !== 'belief'); saveTkThought(clean); })();
function loadTkSituation()     { try { return JSON.parse(localStorage.getItem(TK_SITUATION_KEY) || '[]'); } catch(e){ return []; } }
function saveTkSituation(arr)  { try { localStorage.setItem(TK_SITUATION_KEY, JSON.stringify(arr)); } catch(e){} }
function loadTkValues()        { try { return JSON.parse(localStorage.getItem(TK_VALUES_KEY)    || '[]'); } catch(e){ return []; } }
function saveTkValues(arr)     { try { localStorage.setItem(TK_VALUES_KEY,    JSON.stringify(arr)); } catch(e){} }
function loadTkExp()           { try { return JSON.parse(localStorage.getItem(TK_EXPOSURE_KEY)  || '[]'); } catch(e){ return []; } }
function saveTkExp(arr)        { try { localStorage.setItem(TK_EXPOSURE_KEY,  JSON.stringify(arr)); } catch(e){} }

function genId(prefix) { return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

let savedTimer;
function showSaved(msg) {
  const p = document.getElementById('saved-pill');
  p.textContent = msg || 'saved';
  p.classList.add('show');
  clearTimeout(savedTimer);
  savedTimer = setTimeout(() => p.classList.remove('show'), 1400);
}

// ---------- Shared helpers ----------
const dateKey = (d = new Date()) =>
  `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayKey = () => dateKey();
function streakFor(historyObj, predicate) {
  let streak = 0;
  const d = new Date();
  while (historyObj[dateKey(d)] && predicate(historyObj[dateKey(d)])) {
    streak++;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}
const fmtDate = (key) => {
  const [y,m,d] = key.split('-').map(Number);
  return new Date(y, m-1, d).toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
};
const daysBetween = (a, b) => Math.floor((b - a) / (1000*60*60*24));

function severityLabel(avg) {
  if (avg == null || isNaN(avg)) return null;
  if (avg < 0.5) return 'fair';
  if (avg < 1.5) return 'mild';
  if (avg < 2.5) return 'moderate';
  return 'severe';
}
function severityClass(avg) {
  if (avg == null || isNaN(avg)) return '';
  if (avg < 0.5) return 's-none';
  if (avg < 1.5) return 's-mild';
  if (avg < 2.5) return 's-mod';
  return 's-sev';
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- HAMA helpers ----------
function getTodayEntry() {
  const k = todayKey();
  if (!hamaStore.history[k]) {
    hamaStore.history[k] = { ratings: Array(SYMPTOMS.length).fill(null), note: '', savedAt: null };
  }
  while (hamaStore.history[k].ratings.length < SYMPTOMS.length) hamaStore.history[k].ratings.push(null);
  return hamaStore.history[k];
}
function saveToday() {
  const e = hamaStore.history[todayKey()];
  if (e) e.savedAt = new Date().toISOString();
  persistHama();
  showSaved();
}

// ---------- Backup nudge ----------
function shouldShowNudge() {
  const days = Object.keys(hamaStore.history).filter(k => hamaStore.history[k].ratings.some(r => r != null));
  if (days.length < 3) return false;
  if (metaStore.nudgeDismissedUntil && new Date(metaStore.nudgeDismissedUntil) > new Date()) return false;
  if (!metaStore.lastBackup) return true;
  const last = new Date(metaStore.lastBackup);
  if (daysBetween(last, new Date()) < BACKUP_INTERVAL_DAYS) return false;
  return days.some(k => { const e = hamaStore.history[k]; return e.savedAt && new Date(e.savedAt) > last; });
}
function backupReminderText() {
  if (!metaStore.lastBackup) return "You've been logging for a while — time to save a backup file.";
  const days = daysBetween(new Date(metaStore.lastBackup), new Date());
  return `Last backup was ${days} day${days === 1 ? '' : 's'} ago. Save a fresh copy?`;
}

// ---------- Render: Today ----------
function renderToday() {
  const container = document.getElementById('today-content');
  const entry = getTodayEntry();
  const allSymptoms = SYMPTOMS.map((s, i) => ({ ...s, index: i }));
  const ratedValues = entry.ratings.filter(r => r != null);
  const ratedCount = ratedValues.length;
  const todayAvg = ratedCount ? ratedValues.reduce((a,b) => a+b, 0) / ratedCount : null;
  const sClass = severityClass(todayAvg);
  const sevLabel = severityLabel(todayAvg);
  const showNudge = shouldShowNudge();

  const symptomGroups = [...new Set(SYMPTOMS.map(s => s.group))];
  let symptomsHtml = '<div class="symptoms-wrap">';
  for (const grp of symptomGroups) {
    const grpItems = allSymptoms.filter(s => s.group === grp);
    if (!grpItems.length) continue;
    symptomsHtml += `<div class="group-label gl-${grp.toLowerCase()}">${grp}</div>`;
    symptomsHtml += grpItems.map(s => `
      <div class="metric grp-${s.group.toLowerCase()} ${s.optional ? 'optional-symptom' : ''} ${entry.ratings[s.index] != null ? 'rated' : ''}">
        <div class="metric-head">
          <div class="metric-name">${escapeHtml(s.name)}</div>
          ${s.desc ? `<div class="metric-desc">${escapeHtml(s.desc)}</div>` : ''}
        </div>
        <div class="rate-row">
          ${[0,1,2,3].map(v => `
            <button class="rate-btn ${entry.ratings[s.index] === v ? 'selected' : ''}"
                    data-val="${v}" data-metric="${s.index}">
              <span class="rv">${v}</span>
              <span class="rl">${SCORE_LABELS[v]}</span>
            </button>
          `).join('')}
        </div>
      </div>
    `).join('');
  }
  symptomsHtml += '</div>';

  container.innerHTML = `
    <h1 class="greeting">How are you feeling<em>?</em></h1>
    ${showNudge ? `
      <div class="nudge">
        <div class="nudge-icon">✦</div>
        <div class="nudge-text">
          <div class="nudge-title">Time for a backup</div>
          <div class="nudge-desc">${backupReminderText()} Your data lives in this browser only — a downloaded file protects you if Safari clears it.</div>
          <div class="nudge-actions">
            <button class="nudge-btn primary" id="nudge-backup">Save backup</button>
            <button class="nudge-btn" id="nudge-snooze">Remind me later</button>
          </div>
        </div>
      </div>
    ` : ''}
    <div class="today-snapshot">
      <div class="day-dots">
        ${entry.ratings.map(v => `<div class="dot"${v != null ? ` data-val="${v}"` : ''}></div>`).join('')}
      </div>
      ${ratedCount > 0 ? `
        <div class="snapshot-bottom">
          <span class="score-pill ${sClass}">${todayAvg.toFixed(1)} · ${sevLabel}</span>
          <span class="score-pill">${ratedCount}/${SYMPTOMS.length} rated</span>
        </div>
      ` : ''}
    </div>
    ${symptomsHtml}
    <div class="note-section">
      <label>Note (optional)</label>
      <textarea id="day-note" placeholder="triggers, context, or observations…">${escapeHtml(entry.note)}</textarea>
    </div>
    <button class="action-btn danger" id="reset-today-btn" style="margin-top:48px">Clear today's score</button>
  `;

  container.querySelectorAll('.rate-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.metric);
      const v = parseInt(btn.dataset.val);
      const e = getTodayEntry();
      e.ratings[i] = (e.ratings[i] === v) ? null : v;
      saveToday();
      renderToday();
    });
  });
  const noteEl = container.querySelector('#day-note');
  let noteTimer;
  noteEl.addEventListener('input', () => {
    getTodayEntry().note = noteEl.value;
    clearTimeout(noteTimer);
    noteTimer = setTimeout(saveToday, 600);
  });
  container.querySelector('#reset-today-btn').addEventListener('click', () => {
    if (!confirm("Clear today's ratings and note?")) return;
    delete hamaStore.history[todayKey()];
    persistHama(); renderToday();
  });
  if (showNudge) {
    container.querySelector('#nudge-backup').addEventListener('click', () => {
      exportJSON();
      metaStore.lastBackup = new Date().toISOString();
      persistMeta();
      renderToday();
    });
    container.querySelector('#nudge-snooze').addEventListener('click', () => {
      const snooze = new Date();
      snooze.setDate(snooze.getDate() + 3);
      metaStore.nudgeDismissedUntil = snooze.toISOString();
      persistMeta();
      renderToday();
    });
  }
}

// ---------- Render: History ----------
let editState = { key: null, draft: null };

function renderHistory() {
  const container = document.getElementById('history-content');
  const keys = Object.keys(hamaStore.history)
    .filter(k => hamaStore.history[k].ratings.some(r => r != null))
    .sort().reverse();

  if (keys.length === 0) {
    container.innerHTML = `
      <div class="date-line">HAM-A</div>
      <h1 class="greeting">History<em>.</em></h1>
      <div class="empty">No entries yet — your first record will appear here.</div>
    `;
    return;
  }

  const allRatings = keys.flatMap(k => hamaStore.history[k].ratings.filter(r => r != null));
  const avg = allRatings.length
    ? (allRatings.reduce((a,b) => a+b, 0) / allRatings.length).toFixed(1)
    : '—';

  const streak = streakFor(hamaStore.history, e => e.ratings.some(r => r != null));

  const entriesHtml = keys.map(k => {
    const e = hamaStore.history[k];
    const valid = e.ratings.filter(r => r != null);
    const dayAvg = valid.length ? valid.reduce((a,b) => a+b, 0) / valid.length : null;
    const sev = severityLabel(dayAvg);

    if (editState.key === k) {
      return `
        <div class="day-entry editing" data-key="${k}">
          <div class="day-head">
            <div class="day-head-left"><div class="day-date">${fmtDate(k)}</div></div>
            <div class="entry-actions">

  container.querySelectorAll('.edit-btn').forEach(btn => {

      const k = btn.dataset.key;
      const entry = hamaStore.history[k];
      const ratings = entry.ratings.slice();
      while (ratings.length < SYMPTOMS.length) ratings.push(null);
      editState = { key: k, draft: { ratings, note: entry.note || '' } };
      renderHistory();
    });
  });
  container.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const k = btn.dataset.key;
      if (!confirm(`Delete the entry for ${fmtDate(k)}?`)) return;
      delete hamaStore.history[k];
      if (editState.key === k) editState = { key: null, draft: null };
      persistHama();
      renderHistory();
    });
  });
  container.querySelectorAll('.edit-rate-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.metric);
      const v = parseInt(btn.dataset.val);
      editState.draft.ratings[i] = (editState.draft.ratings[i] === v) ? null : v;
      btn.closest('.edit-rate-row').querySelectorAll('.edit-rate-btn').forEach(b => {

  container.querySelectorAll('.edit-save-btn').forEach(btn => {
